<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Content Studio</title>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap');
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    :root {
        --gold: #C9A84C;
        --gdim: rgba(201, 168, 76, .12);
        --gb: rgba(201, 168, 76, .3);
        --bg: #0e0b14;
        --text: #f0ece4;
        --dim: rgba(240, 236, 228, .55);
        --faint: rgba(240, 236, 228, .28);
        --green: #4A8A6B;
        --r: 12px;
    }

    body {
        font-family: 'Jost', sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        overflow-x: hidden;
    }

    .scr {
        display: none;
        min-height: 100vh;
        flex-direction: column;
    }

    .scr.on {
        display: flex;
    }

    .hdr {
        padding: 14px 18px;
        border-bottom: 1px solid rgba(255, 255, 255, .06);
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(14, 11, 20, .94);
        position: sticky;
        top: 0;
        z-index: 20;
        backdrop-filter: blur(10px);
    }

    .logo {
        font-family: 'Cormorant Garamond', serif;
        font-size: 16px;
        letter-spacing: .1em;
        color: var(--gold);
        font-style: italic;
    }

    .body {
        flex: 1;
        overflow-y: auto;
        padding: 20px 16px 110px;
    }

    .card {
        background: rgba(255, 255, 255, .04);
        border: 1px solid rgba(255, 255, 255, .07);
        border-radius: var(--r);
        padding: 20px;
        margin-bottom: 11px;
    }

    .card-gold {
        border-color: var(--gb);
        background: var(--gdim);
    }

    .card-green {
        border-color: rgba(74, 138, 107, .25);
        background: rgba(74, 138, 107, .06);
    }

    .display {
        font-family: 'Cormorant Garamond', serif;
        font-size: 26px;
        font-weight: 300;
        line-height: 1.3;
        margin-bottom: 4px;
    }

    .sub {
        font-size: 10px;
        letter-spacing: .12em;
        text-transform: uppercase;
        color: var(--faint);
        margin-bottom: 16px;
    }

    .lbl {
        font-size: 10px;
        letter-spacing: .12em;
        text-transform: uppercase;
        color: var(--dim);
        margin-bottom: 8px;
        display: block;
    }

    .q-text {
        font-family: 'Cormorant Garamond', serif;
        font-size: 22px;
        font-weight: 400;
        line-height: 1.55;
        color: var(--text);
        margin-bottom: 10px;
    }

    .nudge {
        font-size: 12px;
        color: var(--faint);
        font-style: italic;
        border-left: 2px solid var(--gb);
        padding-left: 10px;
        margin-bottom: 14px;
        line-height: 1.6;
    }

    .ftags {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
        margin-bottom: 14px;
    }

    .ftag {
        font-size: 9px;
        letter-spacing: .06em;
        text-transform: uppercase;
        border: 1px solid var(--gb);
        color: rgba(201, 168, 76, .6);
        border-radius: 3px;
        padding: 3px 8px;
    }

    .btn {
        border-radius: 8px;
        padding: 13px 18px;
        font-size: 11px;
        letter-spacing: .1em;
        text-transform: uppercase;
        cursor: pointer;
        font-family: 'Jost', sans-serif;
        border: none;
        transition: opacity .15s;
        width: 100%;
        margin-bottom: 8px;
        display: block;
    }

    .btn:hover {
        opacity: .82;
    }

    .btn:last-child {
        margin-bottom: 0;
    }

    .btn-gold {
        background: var(--gold);
        color: #1a1025;
        font-weight: 500;
    }

    .btn-og {
        background: transparent;
        color: var(--gold);
        border: 1px solid var(--gold);
    }

    .btn-og2 {
        background: transparent;
        color: var(--green);
        border: 1px solid rgba(74, 138, 107, .5);
    }

    .btn-od {
        background: transparent;
        color: var(--dim);
        border: 1px solid rgba(255, 255, 255, .15);
    }

    .btn-sm {
        border-radius: 5px;
        padding: 7px 13px;
        font-size: 10px;
        letter-spacing: .07em;
        text-transform: uppercase;
        cursor: pointer;
        font-family: 'Jost', sans-serif;
        border: none;
        width: auto;
        margin-bottom: 0;
    }

    .btn-sm:hover {
        opacity: .82;
    }

    .btn-sm-gold {
        background: var(--gold);
        color: #1a1025;
    }

    .btn-sm-og {
        background: transparent;
        color: var(--gold);
        border: 1px solid var(--gold);
    }

    .btn-sm-og2 {
        background: transparent;
        color: var(--green);
        border: 1px solid rgba(74, 138, 107, .5);
    }

    .btn-sm-od {
        background: transparent;
        color: var(--dim);
        border: 1px solid rgba(255, 255, 255, .15);
    }

    .btn-sm-or {
        background: transparent;
        color: #dc4646;
        border: 1px solid rgba(220, 70, 70, .35);
    }

    .btn-row {
        display: flex;
        gap: 7px;
        flex-wrap: wrap;
        align-items: center;
    }

    textarea {
        width: 100%;
        background: rgba(0, 0, 0, .35);
        border: 1px solid rgba(255, 255, 255, .1);
        border-radius: 8px;
        padding: 13px;
        color: var(--text);
        font-family: 'Jost', sans-serif;
        font-size: 15px;
        line-height: 1.65;
        resize: none;
    }

    textarea::placeholder {
        color: var(--faint);
    }

    textarea:focus {
        outline: none;
        border-color: var(--gb);
    }

    .chk-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 7px;
    }

    .chk {
        display: flex;
        align-items: flex-start;
        gap: 9px;
        padding: 11px;
        border: 1px solid rgba(255, 255, 255, .07);
        border-radius: 9px;
        cursor: pointer;
        transition: all .2s;
    }

    .chk.on {
        border-color: var(--gold);
        background: var(--gdim);
    }

    .chk-box {
        width: 17px;
        height: 17px;
        border-radius: 4px;
        border: 1.5px solid rgba(255, 255, 255, .22);
        flex-shrink: 0;
        margin-top: 1px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
    }

    .chk.on .chk-box {
        border-color: var(--gold);
        background: var(--gold);
        color: #1a1025;
    }

    .chk-l {
        font-size: 11px;
        color: var(--dim);
        line-height: 1.4;
    }

    .chk-s {
        font-size: 9px;
        color: var(--faint);
        margin-top: 2px;
    }

    .rad-list {
        display: flex;
        flex-direction: column;
        gap: 7px;
    }

    .rad {
        display: flex;
        align-items: flex-start;
        gap: 11px;
        padding: 11px;
        border: 1px solid rgba(255, 255, 255, .07);
        border-radius: 9px;
        cursor: pointer;
        transition: all .2s;
    }

    .rad.on {
        border-color: var(--gold);
        background: var(--gdim);
    }

    .rad-dot {
        width: 17px;
        height: 17px;
        border-radius: 50%;
        border: 1.5px solid rgba(255, 255, 255, .22);
        flex-shrink: 0;
        margin-top: 2px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .rad-inner {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--gold);
        opacity: 0;
        transition: opacity .2s;
    }

    .rad.on .rad-dot {
        border-color: var(--gold);
    }

    .rad.on .rad-inner {
        opacity: 1;
    }

    .rad-l {
        font-size: 13px;
        color: var(--dim);
    }

    .rad-s {
        font-size: 10px;
        color: var(--faint);
        margin-top: 2px;
    }

    .status {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        padding: 11px 13px;
        border-radius: 8px;
        margin-bottom: 11px;
    }

    .status.loading {
        background: rgba(124, 92, 191, .1);
        border: 1px solid rgba(124, 92, 191, .2);
        color: #9C7CDF;
    }

    .status.ok {
        background: rgba(74, 138, 107, .1);
        border: 1px solid rgba(74, 138, 107, .2);
        color: var(--green);
    }

    .status.err {
        background: rgba(220, 70, 70, .1);
        border: 1px solid rgba(220, 70, 70, .2);
        color: #e07070;
    }

    .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid rgba(124, 92, 191, .3);
        border-top-color: #9C7CDF;
        border-radius: 50%;
        animation: spin .8s linear infinite;
        flex-shrink: 0;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }

    .pips {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
        margin-bottom: 14px;
    }

    .pip {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: rgba(255, 255, 255, .1);
        flex-shrink: 0;
    }

    .pip.done {
        background: var(--green);
    }

    .pip.cur {
        background: var(--gold);
    }

    .tip {
        background: rgba(201, 168, 76, .07);
        border: 1px solid var(--gb);
        border-radius: 8px;
        padding: 11px 13px;
        font-size: 12px;
        color: var(--dim);
        line-height: 1.65;
        margin-bottom: 11px;
    }

    .tip strong {
        color: var(--gold);
    }

    .divider {
        height: 1px;
        background: rgba(255, 255, 255, .06);
        margin: 16px 0;
    }

    .bot-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(14, 11, 20, .96);
        border-top: 1px solid rgba(255, 255, 255, .07);
        display: flex;
        padding: 8px 12px;
        gap: 8px;
        backdrop-filter: blur(10px);
        z-index: 20;
    }

    .bot-nav .btn {
        margin-bottom: 0;
        padding: 11px 10px;
        font-size: 10px;
    }

    .cat-badge {
        display: inline-block;
        font-size: 9px;
        letter-spacing: .1em;
        text-transform: uppercase;
        border-radius: 3px;
        padding: 3px 9px;
        margin-bottom: 12px;
    }

    .content-body {
        font-size: 13px;
        line-height: 1.75;
        color: rgba(240, 236, 228, .85);
        white-space: pre-wrap;
        margin-bottom: 14px;
    }
    </style>
</head>
<body>

    <div id="s-setup" class="scr on">
        <div class="hdr">
            <div class="logo">Content Studio</div>
        </div>
        <div class="body" id="setup-body"></div>
    </div>

    <div id="s-main" class="scr">
        <div class="hdr">
            <div class="logo">Content Studio</div>
            <div style="display:flex;gap:8px;align-items:center">
                <span id="hdr-prog" style="font-size:10px;color:var(--faint)"></span>
                <button class="btn-sm btn-sm-od" onclick="showSetup()">Settings</button>
            </div>
        </div>
        <div class="body" id="main-body"></div>
        <div class="bot-nav">
            <button class="btn btn-od" id="prev-btn" onclick="prevQ()" style="flex:0 0 auto;width:52px;padding:11px 8px">&#8592;</button>
            <button class="btn btn-gold" id="next-btn" onclick="nextQ()" style="flex:1">Next Question &#8594;</button>
            <button class="btn btn-og2" onclick="showSaved()" style="flex:0 0 auto;width:auto;padding:11px 12px" id="saved-btn">Saved</button>
        </div>
    </div>

    <div id="s-saved" class="scr">
        <div class="hdr">
            <div class="logo">Saved Content</div>
            <button class="btn-sm btn-sm-od" onclick="goMain()">&#8592; Back</button>
        </div>
        <div class="body" id="saved-body"></div>
    </div>

    <script>
    var QS = [
    {
        cat: "My Story",
        col: "#7C5CBF",
        q: "How did you get into this work — what's your origin story?",
        formats: ["Talking Head", "Long-Form Video", "Blog", "Podcast"],
        nudge: "Tell the full story — not just the facts. Where were you? What happened? How did it feel?"
    },
    {
        cat: "My Story",
        col: "#7C5CBF",
        q: "What moment made you realize this work was more than just clothing or color?",
        formats: ["Storytelling Reel", "Podcast", "Long-Form Video"],
        nudge: "Think of a specific moment or client — tell the whole story."
    },
    {
        cat: "My Story",
        col: "#7C5CBF",
        q: "Who is your ideal client and what is she usually feeling when she finds you?",
        formats: ["Talking Head", "Emotional Carousel", "Short Video"]
    },
    {
        cat: "My Story",
        col: "#7C5CBF",
        q: "What do you wish you'd known at the beginning of your journey in this industry?",
        formats: ["Talking Head", "Tip Carousel", "Short Video"]
    },
    {
        cat: "My Color Story",
        col: "#C9884C",
        q: "What is your color season and what was it like when you were first told that result?",
        formats: ["Personal Reel", "Story Carousel", "Relatable Short"],
        nudge: "Walk through the moment — where were you, what were you expecting, how did you feel?"
    },
    {
        cat: "My Color Story",
        col: "#C9884C",
        q: "Were you surprised by your season, or did it confirm something you already sensed?",
        formats: ["Short Video", "Text on Screen", "Carousel"]
    },
    {
        cat: "My Color Story",
        col: "#C9884C",
        q: "Was there a color you had to let go of that was hard to accept wasn't serving you?",
        formats: ["Relatable Reel", "Story Carousel", "Short Video"]
    },
    {
        cat: "My Color Story",
        col: "#C9884C",

    },
    {
        cat: "My Color Story",
        col: "#C9884C",

        formats: ["Candid Short", "Engagement Reel", "Text on Screen"]
    },
    {
        cat: "My Color Story",
        col: "#C9884C",
        q: "Do you have palette envy? If you could pick any other season to be, which one and why?",
        formats: ["Engagement Reel", "Talking Head", "Comment Bait Short"]
    },
    {
        cat: "My Color Story",
        col: "#C9884C",

    },
    {
        cat: "My Color Story",

        nudge: "Describe what you were wearing, when it was, and how you feel now."
    },
    {
        cat: "Color Analysis",

        q: "How would you describe color analysis to someone who has never heard of it?",

    },
    {
        cat: "Color Analysis",

    },
    {
        cat: "Color Analysis",
        col: "#4A8A6B",
        q: "What are the main dimensions analysts evaluate — temperature, chroma, value, contrast — and why does each matter?",
        formats: ["Educational Carousel", "Long-Form Video", "Talking Head"]
    },
    {
        cat: "Color Analysis",
        col: "#4A8A6B",
        q: "Why do so many people over-rely on warm versus cool — and what are they missing?",
        formats: ["Myth-Busting Short", "Text Carousel", "Talking Head"]
    },
    {
        cat: "Color Analysis",
        col: "#4A8A6B",
        q: "What do you actually look at during a draping session — what changes in someone's face?",
        formats: ["Educational Reel", "Faceless B-Roll", "Long-Form Video"],
        nudge: "Get specific and sensory — describe what you actually see. This fascinates people who have never seen a draping."

    {
        cat: "Color Analysis",

    {

        col: "#4A8A6B",
        q: "Why can seeing yourself in the right colors feel emotional or overwhelming?",

    {
        cat: "Color Analysis",
        col: "#4A8A6B",
        q: "What seasons do you see most often in your work? Which do you see least — and why?",
        formats: ["Engagement Reel", "Short Video", "Text on Screen"]
    },
    {
        cat: "Color Analysis",
        col: "#4A8A6B",

    },
    {
        cat: "Color Analysis",
        col: "#4A8A6B",
        q: "Can two people have the same season but look completely different in the same colors — and why?",
        formats: ["Educational Short", "Talking Head", "FAQ Reel"]
    },
    {
        cat: "Color Analysis",
        col: "#4A8A6B",
        q: "Why do some people get completely different results from different analysts — how does that happen?",
        formats: ["Talking Head", "Educational Short", "FAQ Reel"]
    },
    {
        cat: "Color Analysis",
        col: "#4A8A6B",
        q: "Why do so many women say they feel like themselves again after having their colors done?",
        formats: ["Emotional Carousel", "Talking Head", "Long-Form Video"],
        nudge: "This is a thought-leadership answer. Take your time with it."
    },
    {
        cat: "Practical",
        col: "#5B8FA8",
        q: "What is the very first thing you recommend someone do after they receive their color palette?",
        formats: ["Tip Video", "Text Carousel", "Short Video"]
    },
    {
        cat: "Practical",
        col: "#5B8FA8",

    },
    {

        col: "#5B8FA8",

    {

    {

    },
    {
        cat: "Style",
        col: "#A86B4A",

    {
        cat: "Style",

    {

    },
    {
        cat: "Style",
        col: "#A86B4A",

    {

    {

    function escHtml(s) {

    function doCopy(btnId) {
        var el = document.getElementById("content-text");
        var text = el ? el.innerText || el.textContent : "";
        if (!text) {
            return;
        }
        function finish(ok) {
            var btn = document.getElementById(btnId);
            if (btn) {
                var o = btn.textContent || btn.innerHTML;
                btn.textContent = ok ? "✓ Copied!" : "Copy failed";
                setTimeout(function() {
                    btn.textContent = o;
                }, 2500);
            }
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(function() {
                finish(true);
            }).catch(function() {
                fallbackCopy(text, btnId);
            });
        } else {
            fallbackCopy(text, btnId);
        }
    }
    function fallbackCopy(text, btnId) {
        var ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        var ok = false;
        try {
            ok = document.execCommand("copy");
        } catch (e) {}
        document.body.removeChild(ta);
        var btn = document.getElementById(btnId);
        if (btn) {
            var o = btn.textContent || btn.innerHTML;

    async function genContent() {
        var ta = document.getElementById("ans-ta");
        var answer = ta ? ta.value.trim() : "";
        var st = document.getElementById("gen-status");
        var btn = document.getElementById("gen-btn");
        var fmt = S.selFmt[S.qi] || "";
        var voiceId = S.selVoice[S.qi] || S.setup.voice || "friendly";

        if (!answer) {
            if (st)
                st.innerHTML = '<div class="status err">Please type or speak your answer first.</div>';
            return;
        }
        if (!fmt) {
            if (st)
                st.innerHTML = '<div class="status err">Please choose a content format above.</div>';
            return;
        }

        S.answers[S.qi] = answer;
        sv();
        if (st)
            st.innerHTML = '<div class="status loading"><div class="spinner"></div>Generating your content — about 15 seconds…</div>';
        if (btn) {
            btn.disabled = true;
            btn.textContent = "Generating…";
        }

        var q = QS[S.qi];
        var voiceMap = {
            authoritative: "authoritative and educational — expert-led, clear, trust-building",
            friendly: "friendly and conversational — warm, approachable, like talking to a trusted friend",
            entertaining: "entertaining and humorous — fun, playful, personality-forward",
            inspirational: "inspirational and empowering — uplifting, emotional, transformational",
            luxury: "refined and aspirational — elevated, sophisticated, curated"
        };
        var formatMap = {
            shortform: "SHORT-FORM VIDEO SCRIPT (Reels/TikTok/Shorts)\nWrite a complete script with a strong hook for the first 3 seconds, the body, and a CTA. Under 60 seconds read aloud. Label sections: HOOK, BODY, CTA.",
            longform: "LONG-FORM VIDEO OUTLINE (YouTube)\nWrite a complete outline with: title suggestion, intro hook, 3-5 main talking points with detail, and a closing CTA.",
            carousel: "PHOTO/CAROUSEL WITH CAPTION\nWrite: 1) A complete ready-to-post caption with 3-5 hashtags. 2) Slide-by-slide text if it works as a carousel (Slide 1 = hook, last = CTA).",
            blog: "BLOG POST SECTION\nWrite a complete section with: compelling headline, engaging intro, 2-3 body paragraphs, and a closing CTA.",
            podcast: "PODCAST TALKING POINTS\nWrite: episode title suggestion, key talking points with detail, personal stories to expand on, and a closing thought."
        };

        var voiceDesc = voiceMap[voiceId] || "friendly and conversational";
        var formatInstr = formatMap[fmt] || "Create appropriate content for this format.";

        var sys = "You are a content creation assistant for a color analyst and personal stylist.\n"
        + "Voice: " + voiceDesc + "\n"
        + "Task: Create ONE complete piece of content from the voice note answer provided.\n"
        + formatInstr + "\n"
        + "Write complete, polished, ready-to-use content. No preamble or explanation — just the content itself.";

        var usr = "Question I was answering: \"" + q.q + "\"\n\nMy answer: \"" + answer + "\"";

        try {
            var resp = await fetch("/.netlify/functions/generate", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "claude-sonnet-4-5",
                    max_tokens: 1000,
                    system: sys,
                    messages: [{
                        role: "user",
                        content: usr
                    }]
                })
            });
            var data = await resp.json();
            if (data.content && data.content[0] && data.content[0].text) {
                var gen = data.content[0].text.trim();
                S.content[S.qi] = gen;
                sv();
                if (st)
                    st.innerHTML = '<div class="status ok">&#10003; Done — copy below.</div>';
                if (btn) {
                    btn.disabled = false;
                    btn.textContent = "&#10022; Regenerate";
                }
                var existing = document.getElementById("content-text");
                if (existing) {
                    existing.textContent = gen;
                } else {
                    var mb = document.getElementById("main-body");
                    var outDiv = document.createElement("div");
                    outDiv.innerHTML = '<div class="divider"></div>'
                    + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">'
                    + '<span class="lbl" style="margin-bottom:0;color:var(--green)">Generated Content</span>'
                    + '<button class="btn-sm btn-sm-og" id="copy-all-btn" onclick="doCopy(\'copy-all-btn\')">Copy All</button>'
                    + '</div>'
                    + '<div class="card card-green">'
                    + '<div class="content-body" id="content-text">' + escHtml(gen) + '</div>'
                    + '<button class="btn btn-og2" style="margin-bottom:0" onclick="doCopy(\'copy-main-btn\')" id="copy-main-btn">&#128203; Copy This Content</button>'
                    + '</div>';
                    mb.appendChild(outDiv);
                    outDiv.scrollIntoView({
                        behavior: "smooth",
                        block: "start"
                    });
                }
            } else {
                throw new Error("no content returned");
            }
        } catch (err) {
            if (st)
                st.innerHTML = '<div class="status err">Something went wrong — please try again.</div>';
            if (btn) {
                btn.disabled = false;
                btn.textContent = "&#10022; Generate " + fmtL(fmt);
            }
        }
    }

    function svCopy(idx) {
        var text = S.content[idx] || "";
        var btnId = "sv-cp-" + idx;
        var btn = document.getElementById(btnId);
        function finish(ok) {
            if (btn) {
                var o = btn.textContent;
                btn.textContent = ok ? "✓ Copied!" : "Copy failed";
                setTimeout(function() {
                    btn.textContent = o;
                }, 2500);
            }
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(function() {
                finish(true);
            }).catch(function() {
                fallbackCopyText(text, btnId, finish);
            });
        } else {
            fallbackCopyText(text, btnId, finish);
        }
    }
    function fallbackCopyText(text, btnId, cb) {
        var ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        var ok = false;
        try {
            ok = document.execCommand("copy");
        } catch (e) {}
        document.body.removeChild(ta);
        if (cb)
            cb(ok);
    }

    function exportAll() {
        var out = "CONTENT STUDIO — Generated Content\n" + "=".repeat(44) + "\n" + new Date().toLocaleDateString() + "\n\n";
        Object.keys(S.content).filter(function(k) {
            return S.content[k];
        }).forEach(function(idx) {
            var q = QS[parseInt(idx)];
            if (q)
                out += "Q: " + q.q + "\n" + "—".repeat(40) + "\n" + S.content[idx] + "\n\n" + "═".repeat(44) + "\n\n";
        });
        var a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob([out], {
            type: "text/plain"
        }));
        a.download = "GeneratedContent.txt";
        a.click();
    }

    if (S.setup.done) {
        goMain();
    } else {
        rSetup();
    }
    </script>
</body>
