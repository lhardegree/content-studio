<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Content Studio · Color & Style</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--gold:#C9A84C;--gold-dim:rgba(201,168,76,.12);--gold-b:rgba(201,168,76,.3);--bg:#0e0b14;--text:#f0ece4;--dim:rgba(240,236,228,.55);--faint:rgba(240,236,228,.28);--green:#4A8A6B;--purple:#7C5CBF;--r:12px;}
body{font-family:'Jost',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
.scr{display:none;min-height:100vh;flex-direction:column;}.scr.on{display:flex;}
.hdr{padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;justify-content:space-between;background:rgba(14,11,20,.94);position:sticky;top:0;z-index:20;backdrop-filter:blur(10px);}
.logo{font-family:'Cormorant Garamond',serif;font-size:16px;letter-spacing:.1em;color:var(--gold);font-style:italic;}
.body{flex:1;overflow-y:auto;padding:20px 16px 100px;}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:var(--r);padding:20px;margin-bottom:11px;}
.card-gold{border-color:var(--gold-b);background:var(--gold-dim);}
.card-green{border-color:rgba(74,138,107,.25);background:rgba(74,138,107,.06);}
.display{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;line-height:1.3;margin-bottom:4px;}
.sub{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin-bottom:16px;}
.lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:8px;display:block;}
.q-text{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;line-height:1.55;color:var(--text);margin-bottom:10px;}
.nudge{font-size:12px;color:var(--faint);font-style:italic;border-left:2px solid var(--gold-b);padding-left:10px;margin-bottom:14px;line-height:1.6;}
.ftags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;}
.ftag{font-size:9px;letter-spacing:.06em;text-transform:uppercase;border:1px solid var(--gold-b);color:rgba(201,168,76,.6);border-radius:3px;padding:3px 8px;}
.btn{border-radius:8px;padding:13px 18px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;font-family:'Jost',sans-serif;border:none;transition:opacity .15s;width:100%;margin-bottom:8px;display:block;}
.btn:hover{opacity:.82;}.btn:last-child{margin-bottom:0;}
.btn-gold{background:var(--gold);color:#1a1025;font-weight:500;}
.btn-og{background:transparent;color:var(--gold);border:1px solid var(--gold);}
.btn-og2{background:transparent;color:var(--green);border:1px solid rgba(74,138,107,.5);}
.btn-od{background:transparent;color:var(--dim);border:1px solid rgba(255,255,255,.15);}
.btn-sm{border-radius:5px;padding:7px 13px;font-size:10px;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;font-family:'Jost',sans-serif;border:none;width:auto;margin-bottom:0;}
.btn-sm:hover{opacity:.82;}
.btn-sm-gold{background:var(--gold);color:#1a1025;}
.btn-sm-og{background:transparent;color:var(--gold);border:1px solid var(--gold);}
.btn-sm-og2{background:transparent;color:var(--green);border:1px solid rgba(74,138,107,.5);}
.btn-sm-op{background:transparent;color:#9C7CDF;border:1px solid rgba(124,92,191,.5);}
.btn-sm-od{background:transparent;color:var(--dim);border:1px solid rgba(255,255,255,.15);}
.btn-sm-or{background:transparent;color:#dc4646;border:1px solid rgba(220,70,70,.35);}
.btn-row{display:flex;gap:7px;flex-wrap:wrap;align-items:center;}
textarea{width:100%;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:13px;color:var(--text);font-family:'Jost',sans-serif;font-size:15px;line-height:1.65;resize:none;}
textarea::placeholder{color:var(--faint);}textarea:focus{outline:none;border-color:var(--gold-b);}
.chk-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.chk{display:flex;align-items:flex-start;gap:9px;padding:11px;border:1px solid rgba(255,255,255,.07);border-radius:9px;cursor:pointer;transition:all .2s;}
.chk.on{border-color:var(--gold);background:var(--gold-dim);}
.chk-box{width:17px;height:17px;border-radius:4px;border:1.5px solid rgba(255,255,255,.22);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:10px;}
.chk.on .chk-box{border-color:var(--gold);background:var(--gold);color:#1a1025;}
.chk-l{font-size:11px;color:var(--dim);line-height:1.4;}.chk-s{font-size:9px;color:var(--faint);margin-top:2px;}
.rad-list{display:flex;flex-direction:column;gap:7px;}
.rad{display:flex;align-items:flex-start;gap:11px;padding:11px;border:1px solid rgba(255,255,255,.07);border-radius:9px;cursor:pointer;transition:all .2s;}
.rad.on{border-color:var(--gold);background:var(--gold-dim);}
.rad-dot{width:17px;height:17px;border-radius:50%;border:1.5px solid rgba(255,255,255,.22);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;}
.rad-inner{width:7px;height:7px;border-radius:50%;background:var(--gold);opacity:0;transition:opacity .2s;}
.rad.on .rad-dot{border-color:var(--gold);}.rad.on .rad-inner{opacity:1;}
.rad-l{font-size:13px;color:var(--dim);}.rad-s{font-size:10px;color:var(--faint);margin-top:2px;}
.content-section{margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid rgba(255,255,255,.06);}
.content-section:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none;}
.content-type{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
.content-body{font-size:13px;line-height:1.75;color:rgba(240,236,228,.82);white-space:pre-wrap;}
.status{display:flex;align-items:center;gap:8px;font-size:12px;padding:11px 13px;border-radius:8px;margin-bottom:11px;}
.status.loading{background:rgba(124,92,191,.1);border:1px solid rgba(124,92,191,.2);color:#9C7CDF;}
.status.ok{background:rgba(74,138,107,.1);border:1px solid rgba(74,138,107,.2);color:var(--green);}
.status.err{background:rgba(220,70,70,.1);border:1px solid rgba(220,70,70,.2);color:#e07070;}
.spinner{width:14px;height:14px;border:2px solid rgba(124,92,191,.3);border-top-color:#9C7CDF;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
.pips{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px;}
.pip{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.1);flex-shrink:0;}
.pip.done{background:var(--green);}.pip.cur{background:var(--gold);}
.tip{background:rgba(201,168,76,.07);border:1px solid var(--gold-b);border-radius:8px;padding:11px 13px;font-size:12px;color:var(--dim);line-height:1.65;margin-bottom:11px;}
.tip strong{color:var(--gold);}
.div{height:1px;background:rgba(255,255,255,.06);margin:16px 0;}
.hidden{display:none!important;}
.bot-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(14,11,20,.96);border-top:1px solid rgba(255,255,255,.07);display:flex;padding:8px 12px;gap:8px;backdrop-filter:blur(10px);z-index:20;}
.bot-nav .btn{margin-bottom:0;padding:11px 10px;font-size:10px;}
.cat-badge{display:inline-block;font-size:9px;letter-spacing:.1em;text-transform:uppercase;border-radius:3px;padding:3px 9px;margin-bottom:12px;}
</style>
</head>
<body>

<div id="s-setup" class="scr on">
  <div class="hdr"><div class="logo">Content Studio</div></div>
  <div class="body" id="setup-body"></div>
</div>

<div id="s-main" class="scr">
  <div class="hdr">
    <div class="logo">Content Studio</div>
    <div style="display:flex;gap:8px;align-items:center">
      <span id="hdr-prog" style="font-size:10px;color:var(--faint)"></span>
      <button class="btn-sm btn-sm-od" onclick="showSetup()">Settings</button>
    </div>
  </div>
  <div class="body" id="main-body"></div>
  <div class="bot-nav">
    <button class="btn btn-od" id="prev-btn" onclick="prevQ()" style="flex:0 0 auto;width:52px;padding:11px 8px">←</button>
    <button class="btn btn-gold" id="next-btn" onclick="nextQ()" style="flex:1">Next Question →</button>
    <button class="btn btn-og2" onclick="showSaved()" style="flex:0 0 auto;width:auto;padding:11px 12px" id="saved-btn">Saved</button>
  </div>
</div>

<div id="s-saved" class="scr">
  <div class="hdr"><div class="logo">Saved Content</div><button class="btn-sm btn-sm-od" onclick="goMain()">← Back</button></div>
  <div class="body" id="saved-body"></div>
</div>

  {cat:"Myth Busters",col:"#B85C5C",q:"Myth: 'Color analysis is only for people who are really into fashion.'",formats:["Myth-Busting Reel","Relatable Short","Text on Screen"]},
  {cat:"Myth Busters",col:"#B85C5C",q:"Myth: 'Warm means earth tones and cool means jewel tones.'",formats:["Myth-Busting Reel","Educational Short","Text on Screen"]},
  {cat:"Myth Busters",col:"#B85C5C",q:"Myth: 'I need to lose weight or wait until I look different before I do this.'",formats:["Myth-Busting Reel","Emotional Short","Text on Screen"],nudge:"This deserves a real answer. Speak to the woman who believes this."},
  {cat:"Myth Busters",col:"#B85C5C",q:"Myth: 'Style analysis will put me in a box and make me look like everyone else.'",formats:["Myth-Busting Reel","Text on Screen","Short Video"]},
  {cat:"Myth Busters",col:"#B85C5C",q:"Myth: 'You have to spend a lot of money to dress well in your colors.'",formats:["Myth-Busting Reel","Practical Short","Text on Screen"]},
  {cat:"Myth Busters",col:"#B85C5C",q:"Myth: 'The vein test is a reliable way to determine your season.' Is it?",formats:["Myth-Busting Reel","Educational Short","Text on Screen"]},
  // HOT TAKES
  {cat:"Hot Takes",col:"#C9884C",q:"What is one color or style hill you will absolutely die on — a strongly held opinion you won't back down from?",formats:["Engagement Reel","Talking Head","Comment Bait Short"],nudge:"Be bold. A genuine specific opinion makes the best content."},
  {cat:"Hot Takes",col:"#C9884C",q:"What is one color or style unpopular opinion you hold that people might push back on?",formats:["Engagement Reel","Text on Screen","Talking Head"]},
  {cat:"Hot Takes",col:"#C9884C",q:"If you could only wear one color every single day for the next year, what would it be and why?",formats:["Fun Engagement Short","Text on Screen","Story"]},
  // OBJECTIONS
  {cat:"Objections",col:"#5B8FA8",q:"What would you say to someone who says 'I don't want my colors done because I don't want to be limited'?",formats:["Short Video","Text on Screen","Talking Head"],nudge:"Speak directly to her — not at her. She's probably watching."},
  {cat:"Objections",col:"#5B8FA8",q:"What would you say to someone who says 'I don't want a style analysis because I don't want to be told what I can't wear'?",formats:["Short Video","Text on Screen","Talking Head"]},
  {cat:"Objections",col:"#5B8FA8",q:"What would you say to someone who says 'I don't want my colors done because I don't want you to take away my favorite color'?",formats:["Relatable Short","Text on Screen","Talking Head"]},
  {cat:"Objections",col:"#5B8FA8",q:"What would you say to someone who says 'I can just upload my photos to ChatGPT and have it analyze me'?",formats:["Educational Short","Talking Head","Text on Screen"]},
  {cat:"Objections",col:"#5B8FA8",q:"What if I don't like my colors once I have them done?",formats:["FAQ Short","Talking Head","Text on Screen"]},
  {cat:"Objections",col:"#5B8FA8",q:"How do you respond to the objection 'it's too expensive'?",formats:["Talking Head","Short Video","Text on Screen"],nudge:"Don't just address the money — address what's underneath it."},
  {cat:"Objections",col:"#5B8FA8",q:"How do you set someone at ease when they say they don't want a style analysis because they don't want their measurements taken?",formats:["Empathy Short","Talking Head","Text on Screen"],nudge:"Lead with empathy before the explanation."},
  // CLIENT STORIES
  {cat:"Client Stories",col:"#4A8A6B",q:"Tell me about a client experience that really moved you — what happened and why did it stick with you?",formats:["Storytelling Reel","Long-Form Video","Podcast","Emotional Carousel"],nudge:"Tell the whole story. Don't rush. Where were you? What happened? What did she say? This is your best content."},
  {cat:"Client Stories",col:"#4A8A6B",q:"What is the most common reaction clients have when they see themselves in their colors for the first time?",formats:["Emotional Short","Talking Head","Story Carousel"]},
  {cat:"Client Stories",col:"#4A8A6B",q:"What transformation do you see most often that clients don't expect going in?",formats:["Emotional Carousel","Talking Head","Short Video"]},
  {cat:"Client Stories",col:"#4A8A6B",q:"Have you ever had a client who was resistant or skeptical — and what happened?",formats:["Storytelling Reel","Talking Head","Podcast"],nudge:"Tell the story — the resistance, what happened during the session, and what shifted."},
  {cat:"Client Stories",col:"#4A8A6B",q:"What does it look like when a client truly steps into her style identity — what changes beyond just her wardrobe?",formats:["Emotional Carousel","Long-Form Video","Talking Head"]},
  {cat:"Client Stories",col:"#4A8A6B",q:"How do you handle the moment when a client gets emotional — and what does that tell you about what this work really is?",formats:["Emotional Reel","Talking Head","Thought Leadership Short"]},
  {cat:"Client Stories",col:"#4A8A6B",q:"What color have most clients assumed they could never wear — and what happened when they tried it?",formats:["Short Video","Engagement Reel","Text on Screen"]},
  {cat:"Client Stories",col:"#4A8A6B",q:"What color has surprised people most when they actually see it on themselves?",formats:["Engagement Short","Text on Screen","Story"]},
  {cat:"Client Stories",col:"#4A8A6B",q:"What are the reasons clients tell you made them finally decide to get a color analysis?",formats:["Carousel","Talking Head","Relatable Short"]},
  {cat:"Client Stories",col:"#4A8A6B",q:"What are the reasons clients tell you made them finally decide to get a style analysis?",formats:["Carousel","Talking Head","Relatable Short"]},
];

const FMTS=[
  {id:"shortform",l:"Short-Form Video",s:"TikTok, Reels, Shorts"},
  {id:"carousel",l:"Carousel",s:"Swipeable slide posts"},
  {id:"textonscreen",l:"Text on Screen",s:"B-roll & trending audio"},
  {id:"textphoto",l:"Text + Photo",s:"Instagram & Facebook"},
  {id:"youtube",l:"Long-Form Video",s:"YouTube"},
  {id:"blog",l:"Blog Post",s:"Long-form written"},
  {id:"podcast",l:"Podcast Episode",s:"Audio or video podcast"},
];
const VOCS=[
  {id:"authoritative",l:"Authoritative & Educational",s:"Expert-led, trust-building"},
  {id:"friendly",l:"Friendly & Conversational",s:"Warm, approachable"},
  {id:"entertaining",l:"Entertaining & Humorous",s:"Fun, personality-forward"},
  {id:"inspirational",l:"Inspirational & Empowering",s:"Uplifting, transformational"},
  {id:"luxury",l:"Refined & Aspirational",s:"Elevated, sophisticated"},
  {id:"other",l:"Other / Mixed",s:"Describe below"},
];

const SK="csa_v4";
let S={setup:{formats:[],voice:"",voiceOther:"",done:false},qi:0,content:{},answers:{}};
function sv(){try{localStorage.setItem(SK,JSON.stringify(S));}catch{}}
function ld(){try{const d=JSON.parse(localStorage.getItem(SK)||"null");if(d){S.setup=d.setup||S.setup;S.qi=d.qi||0;S.content=d.content||{};S.answers=d.answers||{};}}catch{}}
ld();

function showSetup(){document.querySelectorAll(".scr").forEach(s=>s.classList.remove("on"));document.getElementById("s-setup").classList.add("on");rSetup();}
function goMain(){document.querySelectorAll(".scr").forEach(s=>s.classList.remove("on"));document.getElementById("s-main").classList.add("on");rMain();}
function showSaved(){document.querySelectorAll(".scr").forEach(s=>s.classList.remove("on"));document.getElementById("s-saved").classList.add("on");rSaved();}
function prevQ(){if(S.qi>0){S.qi--;sv();rMain();}}
function nextQ(){if(S.qi<QS.length-1){S.qi++;sv();rMain();}else{showSaved();}}
function fmtL(id){return FMTS.find(f=>f.id===id)?.l||id;}
function vocL(id){return VOCS.find(v=>v.id===id)?.l||id;}
function tFmt(id){const f=S.setup.formats;S.setup.formats=f.includes(id)?f.filter(x=>x!==id):[...f,id];chkDone();sv();rSetup();}
function chkDone(){S.setup.done=S.setup.formats.length>0&&!!S.setup.voice;}

function rSetup(){
  const s=S.setup;chkDone();
  document.getElementById("setup-body").innerHTML=`
  <div style="margin-bottom:22px">
    <div class="display">Welcome</div>
    <div class="sub">Two quick questions — then start</div>
    <p style="font-size:13px;color:var(--faint);line-height:1.7">Tell Claude how to format your content and how to write it. This takes about 30 seconds and saves to your browser so you only do it once.</p>
  </div>
  <div class="card">
    <span class="lbl">What content do you create? <span style="color:var(--gold);font-size:9px">select all that apply ✱</span></span>
    <div class="chk-grid">
      ${FMTS.map(f=>`<div class="chk${s.formats.includes(f.id)?" on":""}" onclick="tFmt('${f.id}')">
        <div class="chk-box">${s.formats.includes(f.id)?"✓":""}</div>
        <div><div class="chk-l">${f.l}</div><div class="chk-s">${f.s}</div></div>
      </div>`).join("")}
    </div>
  </div>
  <div class="card">
    <span class="lbl">Your brand voice <span style="color:var(--gold);font-size:9px">choose one ✱</span></span>
    <div class="rad-list">
      ${VOCS.map(v=>`<div class="rad${s.voice===v.id?" on":""}" onclick="S.setup.voice='${v.id}';chkDone();sv();rSetup()">
        <div class="rad-dot"><div class="rad-inner"></div></div>
        <div><div class="rad-l">${v.l}</div><div class="rad-s">${v.s}</div></div>
      </div>`).join("")}
    </div>
    ${s.voice==="other"?`<textarea placeholder="Describe your brand voice in your own words…" oninput="S.setup.voiceOther=this.value;sv()" style="margin-top:10px;min-height:60px">${s.voiceOther}</textarea>`:""}
  </div>
  <div style="padding-bottom:20px">
    ${s.done
      ?`<button class="btn btn-gold" onclick="goMain()">Start Recording Content →</button>`
      :`<p style="text-align:center;font-size:12px;color:var(--faint);padding:12px 0">Select your content formats and brand voice above to continue.</p>`
    }
  </div>`;
}

function rMain(){
  const q=QS[S.qi];
  const hasContent=!!S.content[S.qi];
  const doneCount=Object.keys(S.content).length;
  document.getElementById("hdr-prog").textContent=doneCount+"/"+QS.length;
  document.getElementById("saved-btn").textContent="Saved ("+doneCount+")";
  document.getElementById("prev-btn").style.opacity=S.qi===0?"0.3":"1";
  document.getElementById("next-btn").textContent=S.qi===QS.length-1?"See All Saved →":"Next Question →";

  document.getElementById("main-body").innerHTML=`
  <div class="pips">${QS.map((_,i)=>`<div class="pip${S.content[i]?" done":i===S.qi?" cur":""}"></div>`).join("")}</div>
  <div class="card">
    <span class="cat-badge" style="background:${q.col}22;color:${q.col};border:1px solid ${q.col}44">${q.cat}</span>
    <div class="ftags">${q.formats.map(f=>`<span class="ftag">${f}</span>`).join("")}</div>
    <div class="q-text">${q.q}</div>
    ${q.nudge?`<div class="nudge">💬 ${q.nudge}</div>`:""}
  </div>
  <div class="tip"><strong>How to answer:</strong> Tap the text box, then tap the <strong>mic key on your keyboard</strong> to speak. Tap mic again to stop. Or just type. Then tap <strong>Generate Content</strong>.</div>
  <textarea id="ans-ta" placeholder="Tap here — use keyboard mic to speak, or type your answer…" style="min-height:130px;margin-bottom:8px">${S.answers[S.qi]||""}</textarea>
  <div id="wc" style="font-size:10px;color:var(--faint);margin-bottom:12px">${S.answers[S.qi]&&S.answers[S.qi].trim()?S.answers[S.qi].trim().split(/\s+/).length+" words":""}</div>
  <div id="gen-status"></div>
  <button class="btn btn-gold" id="gen-btn" onclick="genContent()">✦ Generate Content from This Answer</button>
  ${hasContent?renderOutputHTML(S.content[S.qi]):""}`;

  const ta=document.getElementById("ans-ta");
  if(ta){ta.addEventListener("input",()=>{S.answers[S.qi]=ta.value;sv();const wc=document.getElementById("wc");if(wc)wc.textContent=ta.value.trim()?ta.value.trim().split(/\s+/).length+" words":"";}); }
}

function renderOutputHTML(text){
  const sections=parseSections(text);
  const secHTML=sections.length<=1
    ?`<div class="content-section"><div class="content-body">${text}</div><div class="btn-row" style="margin-top:10px"><button class="btn-sm btn-sm-og2" id="cp-0" onclick="cpT(${JSON.stringify(text)},'cp-0')">Copy</button></div></div>`
    :sections.map((s,i)=>{const id="cp-s"+i;return`<div class="content-section"><div class="content-type">${s.title}</div><div class="content-body">${s.body}</div><div class="btn-row" style="margin-top:10px"><button class="btn-sm btn-sm-og2" id="${id}" onclick="cpT(${JSON.stringify(s.body)},'${id}')">Copy</button></div></div>`;}).join("");
  return`<div class="div"></div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <span class="lbl" style="margin-bottom:0;color:var(--green)">Generated Content</span>
    <button class="btn-sm btn-sm-og" id="cp-all" onclick="cpT(${JSON.stringify(text)},'cp-all')">Copy All</button>
  </div>
  <div class="card card-green"><div>${secHTML}</div></div>`;
}

function parseSections(text){
  const sections=[];let cur=null;
  for(const line of text.split("\n")){
    const isH=/^(#{1,3}\s+|[A-Z][A-Z\s\-&\/]+:)/.test(line.trim())&&line.trim().length>3&&line.trim().length<80;
    if(isH){if(cur)sections.push(cur);cur={title:line.replace(/^#+\s*/,"").replace(/:$/,"").trim(),body:""};}
    else if(cur){cur.body+=(cur.body?"\n":"")+line;}
    else{cur={title:"Content",body:line};}
  }
  if(cur)sections.push(cur);
  return sections.map(s=>({...s,body:s.body.trim()})).filter(s=>s.body);
}

function cpT(text,id){navigator.clipboard.writeText(text).catch(()=>{});const b=document.getElementById(id);if(b){const o=b.textContent;b.textContent="✓ Copied";setTimeout(()=>b.textContent=o,2000);}}

async function genContent(){
  const ta=document.getElementById("ans-ta");
  const answer=ta?ta.value.trim():"";
  const st=document.getElementById("gen-status");
  const btn=document.getElementById("gen-btn");
  if(!answer){if(st)st.innerHTML=`<div class="status err">Please type or speak your answer first.</div>`;return;}
  S.answers[S.qi]=answer;sv();
  if(st)st.innerHTML=`<div class="status loading"><div class="spinner"></div>Generating your content — about 15 seconds…</div>`;
  if(btn){btn.disabled=true;btn.textContent="Generating…";}

  const q=QS[S.qi];const s=S.setup;
  const fmts=s.formats.map(fmtL).join(", ")||"short-form video, carousels, captions";
  const voice=s.voice==="other"?(s.voiceOther||"conversational"):vocL(s.voice)||"friendly and conversational";

  const sys=`You are a content creation assistant for a color analyst and personal stylist.
Brand voice: ${voice}
Content formats to create: ${fmts}

From the voice note answer given, create complete ready-to-use content in each format listed.
Label each piece with its format name in ALL CAPS followed by a colon.
For short-form video: hook (first 3 seconds) + body + CTA, under 60 seconds read aloud.
For carousels: each slide on its own line, Slide 1 = hook, last slide = CTA.
For text on screen: exact on-screen words only, line by line, short phrases.
For blog: full section with headline, intro, body, CTA.
For text + photo: ready caption + 3 hashtags.
For podcast: talking points and key stories to expand on, not a word-for-word script.
Write complete content only — no preamble, no explanation, just the content.`;

  const usr=`Question: "${q.q}"\n\nAnswer: "${answer}"\n\nGenerate content in all my formats.`;

  try{
    const resp=await fetch("/.netlify/functions/generate",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-5",max_tokens:2000,system:sys,messages:[{role:"user",content:usr}]})
    });
    const data=await resp.json();
    if(data.content&&data.content[0]&&data.content[0].text){
      const gen=data.content[0].text.trim();
      S.content[S.qi]=gen;sv();
      if(st)st.innerHTML=`<div class="status ok">✓ Done — scroll down to copy each piece.</div>`;
      if(btn){btn.disabled=false;btn.textContent="✦ Regenerate";}
      const existing=document.getElementById("content-out");if(existing)existing.remove();
      const mb=document.getElementById("main-body");
      const d=document.createElement("div");d.id="content-out";
      d.innerHTML=renderOutputHTML(gen);mb.appendChild(d);
      d.scrollIntoView({behavior:"smooth",block:"start"});
    }else{throw new Error("no content");}
  }catch(err){
    if(st)st.innerHTML=`<div class="status err">Something went wrong — please try again.</div>`;
    if(btn){btn.disabled=false;btn.textContent="✦ Generate Content from This Answer";}
  }
}

function rSaved(){
  const entries=Object.entries(S.content).filter(([,v])=>v);
  document.getElementById("saved-body").innerHTML=`
  <div style="margin-bottom:18px"><div class="display" style="font-size:22px">Saved Content</div><div class="sub">${entries.length} question${entries.length!==1?"s":""} completed</div></div>
  ${entries.length===0?`<div style="text-align:center;color:var(--faint);padding:32px;font-size:13px">No content yet — go back and answer some questions!</div>`:""}
  ${entries.map(([idx,content])=>{const q=QS[parseInt(idx)];if(!q)return"";const id="sv"+idx;const prev=content.slice(0,180)+(content.length>180?"…":"");return`<div class="card" style="margin-bottom:11px"><span class="cat-badge" style="background:${q.col}22;color:${q.col};border:1px solid ${q.col}44;margin-bottom:10px">${q.cat}</span><div style="font-size:13px;color:var(--text);margin-bottom:8px;line-height:1.5">${q.q}</div><div style="font-size:12px;color:var(--faint);font-style:italic;line-height:1.6;margin-bottom:10px">${prev}</div><div class="btn-row"><button class="btn-sm btn-sm-og" id="${id}" onclick="cpT(${JSON.stringify(content)},'${id}')">Copy All</button><button class="btn-sm btn-sm-od" onclick="S.qi=${idx};goMain()">Edit</button><button class="btn-sm btn-sm-or" onclick="delete S.content[${idx}];delete S.answers[${idx}];sv();rSaved()">Delete</button></div></div>`;}).join("")}
  ${entries.length>0?`<div style="margin-top:8px"><button class="btn btn-gold" onclick="exportAll()">↓ Export All as Text File</button></div>`:""}`;
}

function exportAll(){
  let out="CONTENT STUDIO — Generated Content\n"+"=".repeat(44)+"\n"+new Date().toLocaleDateString()+"\n\n";
  Object.entries(S.content).filter(([,v])=>v).forEach(([idx,c])=>{const q=QS[parseInt(idx)];if(q)out+=`Q: ${q.q}\n${"—".repeat(40)}\n${c}\n\n${"═".repeat(44)}\n\n`;});
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([out],{type:"text/plain"}));a.download="GeneratedContent.txt";a.click();
}

if(S.setup.done){goMain();}else{rSetup();}
</script>
</body>
</html>
