<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Content Studio</title>
    <style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    :root {
        --gold: #C9A84C;
        --gdim: rgba(201, 168, 76, .12);
        --gb: rgba(201, 168, 76, .3);
        --bg: #0e0b14;
        --text: #f0ece4;
        --dim: rgba(240, 236, 228, .55);
        --faint: rgba(240, 236, 228, .28);
        --green: #4A8A6B;
        --r: 12px;
    }

    body {
        font-family: Georgia, serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
    }

    .scr {
        display: none;
        min-height: 100vh;
        flex-direction: column;
    }

    .scr.on {
        display: flex;
    }

    .hdr {
        padding: 13px 18px;
        border-bottom: 1px solid rgba(255, 255, 255, .06);
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(14, 11, 20, .94);
        position: sticky;
        top: 0;
        z-index: 20;
    }

    .logo {
        font-size: 16px;
        letter-spacing: .1em;
        color: var(--gold);
        font-style: italic;
    }

    .body {
        flex: 1;
        overflow-y: auto;
        padding: 18px 16px 100px;
    }

    .card {
        background: rgba(255, 255, 255, .04);
        border: 1px solid rgba(255, 255, 255, .07);
        border-radius: var(--r);
        padding: 20px;
        margin-bottom: 12px;
    }

    .card-gold {
        border-color: var(--gb);
        background: var(--gdim);
    }

    .card-green {
        border-color: rgba(74, 138, 107, .25);
        background: rgba(74, 138, 107, .06);
    }

    .h1 {
        font-size: 24px;
        font-weight: normal;
        color: var(--text);
        margin-bottom: 4px;
    }

    .sub {
        font-size: 10px;
        letter-spacing: .12em;
        text-transform: uppercase;
        color: var(--faint);
        margin-bottom: 16px;
    }

    .lbl {
        font-size: 10px;
        letter-spacing: .12em;
        text-transform: uppercase;
        color: var(--dim);
        margin-bottom: 8px;
        display: block;
    }

    .qtext {
        font-size: 20px;
        line-height: 1.6;
        color: var(--text);
        margin-bottom: 10px;
        font-weight: normal;
    }

    .nudge {
        font-size: 12px;
        color: var(--faint);
        font-style: italic;
        border-left: 2px solid var(--gb);
        padding-left: 10px;
        margin-bottom: 14px;
        line-height: 1.6;
    }

    .btn {
        border-radius: 8px;
        padding: 12px 18px;
        font-size: 11px;
        letter-spacing: .1em;
        text-transform: uppercase;
        cursor: pointer;
        font-family: Georgia, serif;
        border: none;
        width: 100%;
        margin-bottom: 8px;
        display: block;
    }

    .btn:last-child {
        margin-bottom: 0;
    }

    .btn-gold {
        background: var(--gold);
        color: #1a1025;
    }

    .btn-og {
        background: transparent;
        color: var(--gold);
        border: 1px solid var(--gold);
    }

    .btn-og2 {
        background: transparent;
        color: var(--green);
        border: 1px solid rgba(74, 138, 107, .5);
    }

    .btn-od {
        background: transparent;
        color: var(--dim);
        border: 1px solid rgba(255, 255, 255, .15);
    }

    .btn-sm {
        border-radius: 5px;
        padding: 6px 12px;
        font-size: 10px;
        letter-spacing: .07em;
        text-transform: uppercase;
        cursor: pointer;
        font-family: Georgia, serif;
        border: none;
        width: auto;
        margin-bottom: 0;
    }

    .btn-sm-gold {
        background: var(--gold);
        color: #1a1025;
    }

    .btn-sm-og {
        background: transparent;
        color: var(--gold);
        border: 1px solid var(--gold);
    }

    .btn-sm-og2 {
        background: transparent;
        color: var(--green);
        border: 1px solid rgba(74, 138, 107, .5);
    }

    .btn-sm-od {
        background: transparent;
        color: var(--dim);
        border: 1px solid rgba(255, 255, 255, .15);
    }

    .btn-sm-or {
        background: transparent;
        color: #dc4646;
        border: 1px solid rgba(220, 70, 70, .35);
    }

    .btn-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
    }

    textarea, input[type=text] {
        width: 100%;
        background: rgba(0, 0, 0, .35);
        border: 1px solid rgba(255, 255, 255, .1);
        border-radius: 8px;
        padding: 12px;
        color: var(--text);
        font-family: Georgia, serif;
        font-size: 14px;
        line-height: 1.65;
        resize: none;
    }

    textarea::placeholder, input::placeholder {
        color: var(--faint);
    }

    textarea:focus, input:focus {
        outline: none;
        border-color: var(--gb);
    }

    .chk-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 7px;
    }

    .chk {
        display: flex;
        align-items: flex-start;
        gap: 9px;
        padding: 11px;
        border: 1px solid rgba(255, 255, 255, .07);
        border-radius: 9px;
        cursor: pointer;
    }

    .chk.on {
        border-color: var(--gold);
        background: var(--gdim);
    }

    .chk-box {
        width: 17px;
        height: 17px;
        border-radius: 4px;
        border: 1.5px solid rgba(255, 255, 255, .22);
        flex-shrink: 0;
        margin-top: 1px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
    }

    .chk.on .chk-box {
        border-color: var(--gold);
        background: var(--gold);
        color: #1a1025;
    }

    .chk-l {
        font-size: 11px;
        color: var(--dim);
        line-height: 1.4;
    }

    .chk-s {
        font-size: 9px;
        color: var(--faint);
        margin-top: 2px;
    }

    .rad-list {
        display: flex;
        flex-direction: column;
        gap: 7px;
    }

    .rad {
        display: flex;
        align-items: flex-start;
        gap: 11px;
        padding: 11px;
        border: 1px solid rgba(255, 255, 255, .07);
        border-radius: 9px;
        cursor: pointer;
    }

    .rad.on {
        border-color: var(--gold);
        background: var(--gdim);
    }

    .rad-dot {
        width: 17px;
        height: 17px;
        border-radius: 50%;
        border: 1.5px solid rgba(255, 255, 255, .22);
        flex-shrink: 0;
        margin-top: 2px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .rad-inner {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--gold);
        opacity: 0;
    }

    .rad.on .rad-dot {
        border-color: var(--gold);
    }

    .rad.on .rad-inner {
        opacity: 1;
    }

    .rad-l {
        font-size: 13px;
        color: var(--dim);
    }

    .rad-s {
        font-size: 10px;
        color: var(--faint);
        margin-top: 2px;
    }

    .pips {
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
        margin-bottom: 14px;
    }

    .pip {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: rgba(255, 255, 255, .1);
        flex-shrink: 0;
    }

    .pip.done {
        background: var(--green);
    }

    .pip.cur {
        background: var(--gold);
    }

    .status {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        padding: 11px 13px;
        border-radius: 8px;
        margin-bottom: 11px;
    }

    .status.loading {
        background: rgba(124, 92, 191, .1);
        border: 1px solid rgba(124, 92, 191, .2);
        color: #9C7CDF;
    }

    .status.ok {
        background: rgba(74, 138, 107, .1);
        border: 1px solid rgba(74, 138, 107, .2);
        color: var(--green);
    }

    .status.err {
        background: rgba(220, 70, 70, .1);
        border: 1px solid rgba(220, 70, 70, .2);
        color: #e07070;
    }

    .spinner {
        width: 13px;
        height: 13px;
        border: 2px solid rgba(124, 92, 191, .3);
        border-top-color: #9C7CDF;
        border-radius: 50%;
        animation: spin .8s linear infinite;
        flex-shrink: 0;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }

    .tip {
        background: rgba(201, 168, 76, .07);
        border: 1px solid var(--gb);
        border-radius: 8px;
        padding: 11px 13px;
        font-size: 12px;
        color: var(--dim);
        line-height: 1.65;
        margin-bottom: 11px;
    }

    .tip strong {
        color: var(--gold);
    }

    .div {
        height: 1px;
        background: rgba(255, 255, 255, .06);
        margin: 16px 0;
    }

    .bot-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(14, 11, 20, .96);
        border-top: 1px solid rgba(255, 255, 255, .07);
        display: flex;
        padding: 8px 12px;
        gap: 8px;
    }

    .bot-nav .btn {
        margin-bottom: 0;
        padding: 11px 10px;
        font-size: 10px;
    }

    .cat-badge {
        display: inline-block;
        font-size: 9px;
        letter-spacing: .1em;
        text-transform: uppercase;
        border-radius: 3px;
        padding: 3px 9px;
        margin-bottom: 12px;
    }

    .voice-pill {
        padding: 8px 12px;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, .1);
        font-size: 11px;
        color: var(--dim);
        cursor: pointer;
        display: inline-block;
        margin: 3px;
    }

    .voice-pill.on {
        border-color: var(--gold);
        background: var(--gdim);
        color: var(--gold);
    }

    .content-out {
        font-size: 13px;
        line-height: 1.75;
        color: rgba(240, 236, 228, .85);
        white-space: pre-wrap;
        margin-bottom: 14px;
    }

    .copy-btn {
        background: var(--green);
        color: #fff;
        border: none;
        border-radius: 6px;
        padding: 12px;
        font-size: 12px;
        letter-spacing: .08em;
        text-transform: uppercase;
        cursor: pointer;
        font-family: Georgia, serif;
        width: 100%;
    }

    .copy-btn:active {
        opacity: .7;
    }
    </style>
</head>
<body>

    <div id="s-setup" class="scr on">
        <div class="hdr">
            <div class="logo">Content Studio</div>
        </div>
        <div class="body" id="setup-body"></div>
    </div>

    <div id="s-main" class="scr">
        <div class="hdr">
            <div class="logo">Content Studio</div>
            <div style="display:flex;gap:8px;align-items:center">
                <span id="hdr-prog" style="font-size:10px;color:var(--faint)"></span>
                <button class="btn-sm btn-sm-od" onclick="showSetup()">Settings</button>
            </div>
        </div>
        <div class="body" id="main-body"></div>
        <div class="bot-nav">
            <button class="btn btn-od" id="prev-btn" onclick="prevQ()" style="flex:0 0 auto;width:52px;padding:11px 8px">←</button>
            <button class="btn btn-gold" id="next-btn" onclick="nextQ()" style="flex:1">Next →</button>
            <button class="btn btn-og2" onclick="showSaved()" style="flex:0 0 auto;width:auto;padding:11px 12px" id="saved-btn">Saved</button>
        </div>
    </div>

    <div id="s-saved" class="scr">
        <div class="hdr">
            <div class="logo">Saved Content</div>
            <button class="btn-sm btn-sm-od" onclick="goMain()">Back</button>
        </div>
        <div class="body" id="saved-body"></div>
    </div>

    },
    {
        cat: "Objections",
        col: "#5B8FA8",
        q: "How do you set someone at ease when they say they do not want a style analysis because they do not want their measurements taken?",
        nudge: "Lead with empathy before the explanation."
    },
    {
        cat: "Client Stories",
        col: "#4A8A6B",
        q: "Tell me about a client experience that really moved you - what happened and why did it stick with you?",
        nudge: "Tell the whole story. Do not rush. Where were you? What happened? What did she say? This is your best content."
    },
    {
        cat: "Client Stories",
        col: "#4A8A6B",
        q: "What is the most common reaction clients have when they see themselves in their colors for the first time?"
    },
    {
        cat: "Client Stories",
        col: "#4A8A6B",
        q: "Have you ever had a client who was resistant or skeptical - and what happened?",
        nudge: "Tell the story - the resistance, what happened, and what shifted."
    },
    {
        cat: "Client Stories",
        col: "#4A8A6B",
        q: "What does it look like when a client truly steps into her style identity - what changes beyond just her wardrobe?"
    },
    {
        cat: "Client Stories",
        col: "#4A8A6B",
        q: "How do you handle the moment when a client gets emotional - and what does that tell you about what this work really is?"
    },
    {
        cat: "Client Stories",
        col: "#4A8A6B",
        q: "What color have most clients assumed they could never wear - and what happened when they tried it?"
    },
    {
        cat: "Client Stories",
        col: "#4A8A6B",
        q: "What are the reasons clients tell you made them finally decide to get a color analysis?"
    },
    {
        cat: "Client Stories",
        col: "#4A8A6B",
        q: "What are the reasons clients tell you made them finally decide to get a style analysis?"
    }
    ];

    var FMTS = [
    {
        id: "shortform",
        l: "Short-Form Video",
        s: "Reels, TikTok, Shorts"
    },
    {
        id: "longform",
        l: "Long-Form Video",
        s: "YouTube"
    },
    {
        id: "carousel",
        l: "Photo / Carousel",
        s: "With caption"
    },
    {
        id: "blog",
        l: "Blog Post",
        s: "Long-form written"
    }
    ];

    var VOCS = [
    {
        id: "authoritative",
        l: "Authoritative"
    },
    {
        id: "friendly",
        l: "Conversational"
    },
    {
        id: "entertaining",
        l: "Humorous"
    },
    {
        id: "inspirational",
        l: "Inspirational"
    },
    {
        id: "luxury",
        l: "Aspirational"
    }
    ];

    var FORMAT_INSTRUCTIONS = {
        shortform: "Write a complete short-form video script with three clearly labeled sections: HOOK (the first 3 seconds to stop the scroll), BODY (the main content), and CTA (call to action). Keep it under 60 seconds when read aloud.",
        longform: "Write a complete long-form video outline with: a compelling title suggestion, a strong opening hook, 3 to 5 main talking points with detail notes for each, and a closing call to action.",
        carousel: "Write two things: 1) A complete Instagram or Facebook caption ready to post with 3 to 5 relevant hashtags at the end. 2) A carousel slide breakdown where each slide has its own line of text, starting with a hook slide and ending with a call to action slide.",
        blog: "Write a complete blog post section with: a compelling headline, an engaging opening paragraph, 2 to 3 body paragraphs that expand the key ideas with depth, and a closing paragraph with a soft call to action."
    };

    var VOICE_DESCRIPTIONS = {
        authoritative: "authoritative and educational - expert-led, clear, and trust-building",
        friendly: "friendly and conversational - warm, approachable, like talking to a trusted friend",
        entertaining: "entertaining and humorous - fun, playful, and personality-forward",
        inspirational: "inspirational and empowering - uplifting, emotional, and transformational",
        luxury: "refined and aspirational - elevated, sophisticated, and curated"
    };

    var SK = "css_v5";
    var S = {
        setup: {
            formats: [],
            voice: "",
            done: false
        },
        qi: 0,
        content: {},
        answers: {},
        fmt: {},
        voice: {}
    };

    function sv() {
        try {
            localStorage.setItem(SK, JSON.stringify(S));
        } catch (e) {}
    }
    function ld() {
        try {
            var d = JSON.parse(localStorage.getItem(SK) || "null");
            if (d) {
                S.setup = d.setup || S.setup;
                S.qi = d.qi || 0;
                S.content = d.content || {};
                S.answers = d.answers || {};
                S.fmt = d.fmt || {};
                S.voice = d.voice || {};
            }
        } catch (e) {}
    }
    ld();

    function showSetup() {
        document.querySelectorAll(".scr").forEach(function(s) {
            s.classList.remove("on");
        });
        document.getElementById("s-setup").classList.add("on");
        rSetup();
    }
    function goMain() {
        document.querySelectorAll(".scr").forEach(function(s) {
            s.classList.remove("on");
        });
        document.getElementById("s-main").classList.add("on");
        rMain();
    }
    function showSaved() {
        document.querySelectorAll(".scr").forEach(function(s) {
            s.classList.remove("on");
        });
        document.getElementById("s-saved").classList.add("on");
        rSaved();
    }
    function prevQ() {
        if (S.qi > 0) {
            S.qi--;
            sv();
            rMain();
        }
    }
    function nextQ() {
        if (S.qi < QS.length - 1) {
            S.qi++;
            sv();
            rMain();
        } else {
            showSaved();
        }
    }

    function tFmt(id) {
        var f = S.setup.formats;
        if (f.indexOf(id) >= 0) {
            S.setup.formats = f.filter(function(x) {
                return x !== id;
            });
        }
        else {
            S.setup.formats.push(id);
        }
        S.setup.done = S.setup.formats.length > 0 && !!S.setup.voice;
        sv();
        rSetup();
    }

    function rSetup() {
        var s = S.setup;
        S.setup.done = s.formats.length > 0 && !!s.voice;
        document.getElementById("setup-body").innerHTML =
        '<div style="margin-bottom:20px"><div class="h1">Welcome</div><div class="sub">Two quick questions then start</div><p style="font-size:13px;color:var(--faint);line-height:1.7">Tell Claude what content you create and how you write. Saves to your browser so you only do this once.</p></div>' +
        '<div class="card">' +
        '<span class="lbl">What content do you create? <span style="color:var(--gold);font-size:9px">select all that apply</span></span>' +
        '<div class="chk-grid">' +
        FMTS.map(function(f) {
            var on = s.formats.indexOf(f.id) >= 0;
            return '<div class="chk' + (on ? " on" : "") + '" onclick="tFmt(\'' + f.id + '\')">' +
            '<div class="chk-box">' + (on ? "checkmark" : "") + ' </div>' +
            '<div><div class="chk-l">' + f.l + '</div><div class="chk-s">' + f.s + '</div></div>' +
            '</div>';
        }).join("") +
        '</div></div>' +
        '<div class="card">' +
        '<span class="lbl">Brand voice <span style="color:var(--gold);font-size:9px">choose one</span></span>' +
        '<div class="rad-list">' +
        VOCS.map(function(v) {
            var on = s.voice === v.id;
            return '<div class="rad' + (on ? " on" : "") + '" onclick="S.setup.voice=\'' + v.id + '\';S.setup.done=S.setup.formats.length>0&&true;sv();rSetup()">' +
            '<div class="rad-dot"><div class="rad-inner"></div></div>' +
            '<div><div class="rad-l">' + v.l + '</div></div>' +
            '</div>';
        }).join("") +
        '</div></div>' +
        '<div style="padding-bottom:20px">' +
        (S.setup.done ?
        '<button class="btn btn-gold" onclick="goMain()">Start Recording Content</button>' :
        '<p style="text-align:center;font-size:12px;color:var(--faint);padding:12px">Select your content formats and brand voice above to continue.</p>'
        ) +
        '</div>';

        var boxes = document.querySelectorAll(".chk-box");
        boxes.forEach(function(b, i) {
            if (b.parentElement.classList.contains("on")) {
                b.innerHTML = "&#10003;";
            } else {
                b.innerHTML = "";
            }
        });
    }

    function rMain() {
        var q = QS[S.qi];
        var cnt = Object.keys(S.content).length;
        document.getElementById("hdr-prog").textContent = cnt + "/" + QS.length;
        document.getElementById("saved-btn").textContent = "Saved (" + cnt + ")";
        document.getElementById("prev-btn").style.opacity = S.qi === 0 ? "0.3" : "1";
        document.getElementById("next-btn").textContent = S.qi === QS.length - 1 ? "See Saved" : "Next";

        var curFmt = S.fmt[S.qi] || "";
        var curVoice = S.voice[S.qi] || S.setup.voice || "";

        var fmtHTML = FMTS.map(function(f) {
            var on = curFmt === f.id;
            return '<div class="chk' + (on ? " on" : "") + '" onclick="S.fmt[' + S.qi + ']=\'' + f.id + '\';sv();rMain()">' +
            '<div class="chk-box">' + (on ? "&#10003;" : "") + ' </div>' +
            '<div><div class="chk-l">' + f.l + '</div><div class="chk-s">' + f.s + '</div></div>' +
            '</div>';
        }).join("");

        var voiceHTML = VOCS.map(function(v) {
            var on = curVoice === v.id;
            return '<span class="voice-pill' + (on ? " on" : "") + '" onclick="S.voice[' + S.qi + ']=\'' + v.id + '\';sv();rMain()">' + v.l + '</span>';
        }).join("");

        var ansVal = S.answers[S.qi] || "";
        var existingContent = S.content[S.qi] || "";

        var html =
        '<div class="pips">' + QS.map(function(_, i) {
            return '<div class="pip' + (S.content[i] ? " done" : i === S.qi ? " cur" : "") + ' "></div>';
        }).join("") + '</div>' +
        '<div class="card">' +
        '<span class="cat-badge" style="background:' + q.col + '22;color:' + q.col + ';border:1px solid ' + q.col + '44">' + q.cat + '</span>' +
        '<div class="qtext">' + q.q + '</div>' +
        (q.nudge ? '<div class="nudge">' + q.nudge + '</div>' : '') +
        '</div>' +
        '<div class="tip"><strong>How to answer:</strong> Tap the text box, then tap the <strong>mic key on your keyboard</strong> to speak. Tap again to stop. Or just type. Then choose a format below.</div>' +
        '<textarea id="ans-ta" placeholder="Tap here and use the keyboard mic to speak, or type your answer..." style="min-height:130px;margin-bottom:8px">' + ansVal + '</textarea>' +
        '<div id="wc" style="font-size:10px;color:var(--faint);margin-bottom:16px">' + (ansVal.trim() ? ansVal.trim().split(/\s+/).length + " words" : "") + ' </div>' +
        '<div class="card" style="margin-bottom:11px">' +
        '<span class="lbl" style="margin-bottom:12px;display:block">Choose content type</span>' +
        '<div class="chk-grid">' + fmtHTML + '</div>' +
        '</div>' +
        '<div class="card" style="margin-bottom:11px">' +
        '<span class="lbl" style="margin-bottom:10px;display:block">Brand voice <span style="color:var(--faint);font-size:9px">optional - changes per question</span></span>' +
        '<div>' + voiceHTML + '</div>' +
        '</div>' +
        '<div id="gen-status"></div>' +
        '<button class="btn ' + (curFmt ? "btn-gold" : "btn-od") + '" id="gen-btn" onclick="genContent()" ' + (curFmt ? "" : "disabled") + '>' +
        (curFmt ? "Generate " + FMTS.filter(function(f) {
            return f.id === curFmt;
        })[0].l : "Choose a content type above") +
        '</button>' +
        (existingContent ?
        '<div class="div"></div>' +
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">' +
        '<span class="lbl" style="margin-bottom:0;color:var(--green)">Generated Content</span>' +
        '<button class="btn-sm btn-sm-og" onclick="doCopy()">Copy All</button>' +
        '</div>' +
        '<div class="card card-green">' +
        '<div id="content-display" class="content-out">' + existingContent + '</div>' +
        '<button class="copy-btn" onclick="doCopy()">Copy This Content</button>' +
        '</div>' : ""
        );

        document.getElementById("main-body").innerHTML = html;

        var ta = document.getElementById("ans-ta");
        if (ta) {
            ta.addEventListener("input", function() {
                S.answers[S.qi] = ta.value;
                sv();
                var wc = document.getElementById("wc");
                if (wc) {
                    wc.textContent = ta.value.trim() ? ta.value.trim().split(/\s+/).length + " words" : "";
                }
            });
        }
    }

    function doCopy() {
        var el = document.getElementById("content-display");
        if (!el) {
            return;
        }
        var text = el.innerText || el.textContent || "";
        if (!text) {
            return;
        }

        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(function() {
                showCopied();
            }).catch(function() {
                fallbackCopy(text);
            });
        } else {
            fallbackCopy(text);
        }
    }

    function fallbackCopy(text) {
        var ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.left = "-9999px";
        ta.style.top = "-9999px";
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        try {
            document.execCommand("copy");
            showCopied();
        } catch (e) {
            alert("Please long-press the content above and select Copy.");
        }
        document.body.removeChild(ta);
    }

    function showCopied() {
        var btns = document.querySelectorAll(".copy-btn,.btn-sm-og");
        btns.forEach(function(b) {
            var orig = b.textContent;
            b.textContent = "Copied!";
            setTimeout(function() {
                b.textContent = orig;
            }, 2000);
        });
    }

    async function genContent() {
        var ta = document.getElementById("ans-ta");
        var answer = ta ? ta.value.trim() : "";
        var st = document.getElementById("gen-status");
        var btn = document.getElementById("gen-btn");
        var fmt = S.fmt[S.qi] || "";
        var voiceId = S.voice[S.qi] || S.setup.voice || "friendly";

        if (!answer) {
            if (st) {
                st.innerHTML = '<div class="status err">Please type or speak your answer first.</div>';
            }
            return;
        }
        if (!fmt) {
            if (st) {
                st.innerHTML = '<div class="status err">Please choose a content type above.</div>';
            }
            return;
        }

        S.answers[S.qi] = answer;
        sv();
        if (st) {
            st.innerHTML = '<div class="status loading"><div class="spinner"></div>Generating your content...</div>';
        }
        if (btn) {
            btn.disabled = true;
            btn.textContent = "Generating...";
        }

        var q = QS[S.qi];
        var voiceDesc = VOICE_DESCRIPTIONS[voiceId] || "friendly and conversational";
        var fmtInstructions = FORMAT_INSTRUCTIONS[fmt] || "Create appropriate content.";
        var fmtLabel = FMTS.filter(function(f) {
            return f.id === fmt;
        })[0].l;

        var systemPrompt = "You are a content creation assistant for a color analyst and personal stylist. " +
        "Voice: " + voiceDesc + ". " +
        "Task: Create one complete piece of content from the voice note answer. " +
        "Format: " + fmtInstructions + " " +
        "Write complete polished ready-to-use content. No preamble or explanation. Just the content itself.";

        var userPrompt = "Question: " + q.q + "\n\nAnswer: " + answer;

        try {
            var resp = await fetch("/.netlify/functions/generate", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "claude-sonnet-4-5",
                    max_tokens: 1000,
                    system: systemPrompt,
                    messages: [{
                        role: "user",
                        content: userPrompt
                    }]
                })
            });
            var data = await resp.json();
            if (data.content && data.content[0] && data.content[0].text) {
                var gen = data.content[0].text.trim();
                S.content[S.qi] = gen;
                sv();
                if (st) {
                    st.innerHTML = '<div class="status ok">Done - tap Copy below.</div>';
                }
                if (btn) {
                    btn.disabled = false;
                    btn.textContent = "Regenerate " + fmtLabel;
                }

                var mb = document.getElementById("main-body");
                var existing = document.getElementById("content-display");
                if (existing) {
                    existing.textContent = gen;
                } else {
                    var div = document.createElement("div");
                    div.innerHTML =
                    '<div class="div"></div>' +
                    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">' +
                    '<span class="lbl" style="margin-bottom:0;color:var(--green)">Generated Content</span>' +
                    '<button class="btn-sm btn-sm-og" onclick="doCopy()">Copy All</button>' +
                    '</div>' +
                    '<div class="card card-green">' +
                    '<div id="content-display" class="content-out">' + gen + '</div>' +
                    '<button class="copy-btn" onclick="doCopy()">Copy This Content</button>' +
                    '</div>';
                    mb.appendChild(div);
                    div.scrollIntoView({
                        behavior: "smooth",
                        block: "start"
                    });
                }
            } else {
                throw new Error("no content");
            }
        } catch (err) {
            if (st) {
                st.innerHTML = '<div class="status err">Something went wrong - please try again.</div>';
            }
            if (btn) {
                btn.disabled = false;
                btn.textContent = "Generate " + fmtLabel;
            }
        }
    }

    function rSaved() {
        var entries = Object.entries(S.content).filter(function(e) {
            return e[1];
        });
        var html =
        '<div style="margin-bottom:18px"><div class="h1" style="font-size:22px">Saved Content</div>' +
        '<div class="sub">' + entries.length + ' completed</div></div>';

        if (entries.length === 0) {
            html += '<div style="text-align:center;color:var(--faint);padding:32px;font-size:13px">No content yet. Go back and answer some questions!</div>';
        }

        entries.forEach(function(e) {
            var idx = parseInt(e[0]);
            var content = e[1];
            var q = QS[idx];
            if (!q) {
                return;
            }
            var safeId = "sv" + idx;
            html +=
            '<div class="card" style="margin-bottom:11px">' +
            '<span class="cat-badge" style="background:' + q.col + '22;color:' + q.col + ';border:1px solid ' + q.col + '44">' + q.cat + '</span>' +
            '<div style="font-size:13px;color:var(--text);margin-bottom:8px;line-height:1.5">' + q.q + '</div>' +
            '<div id="' + safeId + '" style="font-size:12px;color:var(--faint);font-style:italic;line-height:1.6;margin-bottom:10px">' + content.slice(0, 200) + (content.length > 200 ? "..." : "") + '</div>' +
            '<div class="btn-row">' +
            '<button class="btn-sm btn-sm-og" onclick="svCopy(\'' + safeId + '\',\'' + content.replace(/'/g, "\\'").replace(/\n/g, "\\n") + '\')" >Copy</button>' +
            '<button class="btn-sm btn-sm-od" onclick="S.qi=' + idx + ';goMain()">Edit</button>' +
            '<button class="btn-sm btn-sm-or" onclick="delete S.content[' + idx + '];sv();rSaved()">Delete</button>' +
            '</div></div>';
        });

        if (entries.length > 0) {
            html += '<div style="margin-top:8px"><button class="btn btn-gold" onclick="exportAll()">Export All as Text File</button></div>';
        }

        document.getElementById("saved-body").innerHTML = html;
    }

    function svCopy(elId, text) {
        var realText = text.replace(/\\n/g, "\n");
        fallbackCopy(realText);
    }

    function exportAll() {
        var out = "CONTENT STUDIO - Generated Content\n";
        out += "Exported: " + new Date().toLocaleDateString() + "\n\n";
        Object.entries(S.content).filter(function(e) {
            return e[1];
        }).forEach(function(e) {
            var q = QS[parseInt(e[0])];
            if (q) {
                out += "Q: " + q.q + "\n\n" + e[1] + "\n\n" + "----\n\n";
            }
        });
        var a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob([out], {
            type: "text/plain"
        }));
        a.download = "GeneratedContent.txt";
        a.click();
    }

    if (S.setup.done) {
        goMain();
    } else {
        rSetup();
    }
    </script>
</body>
</html>
