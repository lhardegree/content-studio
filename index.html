<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Content Studio</title>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap');
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    :root {
        --gold: #C9A84C;
        --gdim: rgba(201, 168, 76, .12);
        --gb: rgba(201, 168, 76, .3);
        --bg: #0e0b14;
        --text: #f0ece4;
        --dim: rgba(240, 236, 228, .55);
        --faint: rgba(240, 236, 228, .28);
        --green: #4A8A6B;
        --r: 12px;
    }

    body {
        font-family: 'Jost', sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        overflow-x: hidden;
    }

    .scr {
        display: none;
        min-height: 100vh;
        flex-direction: column;
    }

    .scr.on {
        display: flex;
    }

    .hdr {
        padding: 14px 18px;
        border-bottom: 1px solid rgba(255, 255, 255, .06);
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: rgba(14, 11, 20, .94);
        position: sticky;
        top: 0;
        z-index: 20;
        backdrop-filter: blur(10px);
    }

    .logo {
        font-family: 'Cormorant Garamond', serif;
        font-size: 16px;
        letter-spacing: .1em;
        color: var(--gold);
        font-style: italic;
    }

    .body {
        flex: 1;
        overflow-y: auto;
        padding: 20px 16px 40px;
    }

    .card {
        background: rgba(255, 255, 255, .04);
        border: 1px solid rgba(255, 255, 255, .07);
        border-radius: var(--r);
        padding: 20px;
        margin-bottom: 11px;
    }

    .card-green {
        border-color: rgba(74, 138, 107, .25);
        background: rgba(74, 138, 107, .06);
    }

    .display {
        font-family: 'Cormorant Garamond', serif;
        font-size: 26px;
        font-weight: 300;
        line-height: 1.3;
        margin-bottom: 6px;
    }

    .sub {
        font-size: 10px;
        letter-spacing: .12em;
        text-transform: uppercase;
        color: var(--faint);
        margin-bottom: 14px;
    }

    .lbl {
        font-size: 10px;
        letter-spacing: .12em;
        text-transform: uppercase;
        color: var(--dim);
        margin-bottom: 9px;
        display: block;
    }

    .q-text {
        font-family: 'Cormorant Garamond', serif;
        font-size: 21px;
        font-weight: 400;
        line-height: 1.55;
        color: var(--text);
        margin-bottom: 10px;
    }

    .nudge {
        font-size: 12px;
        color: var(--faint);
        font-style: italic;
        border-left: 2px solid var(--gb);
        padding-left: 10px;
        margin-bottom: 14px;
        line-height: 1.65;
    }

    .btn {
        border-radius: 8px;
        padding: 13px 18px;
        font-size: 11px;
        letter-spacing: .1em;
        text-transform: uppercase;
        cursor: pointer;
        font-family: 'Jost', sans-serif;
        border: none;
        transition: opacity .15s;
        width: 100%;
        margin-bottom: 8px;
        display: block;
        text-align: center;
    }

    .btn:hover {
        opacity: .82;
    }

    .btn:last-child {
        margin-bottom: 0;
    }

    .btn-gold {
        background: var(--gold);
        color: #1a1025;
        font-weight: 500;
    }

    .btn-og {
        background: transparent;
        color: var(--gold);
        border: 1px solid var(--gold);
    }

    .btn-og2 {
        background: transparent;
        color: var(--green);
        border: 1px solid rgba(74, 138, 107, .5);
    }

    .btn-od {
        background: transparent;
        color: var(--dim);
        border: 1px solid rgba(255, 255, 255, .15);
    }

    .btn-sm {
        border-radius: 5px;
        padding: 7px 13px;
        font-size: 10px;
        letter-spacing: .07em;
        text-transform: uppercase;
        cursor: pointer;
        font-family: 'Jost', sans-serif;
        border: none;
        width: auto;
        margin-bottom: 0;
    }

    .btn-sm:hover {
        opacity: .82;
    }

    .btn-sm-og {
        background: transparent;
        color: var(--gold);
        border: 1px solid var(--gold);
    }

    .btn-sm-od {
        background: transparent;
        color: var(--dim);
        border: 1px solid rgba(255, 255, 255, .15);
    }

    .btn-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
    }

    input[type=text] {
        width: 100%;
        background: rgba(0, 0, 0, .35);
        border: 1px solid rgba(255, 255, 255, .1);
        border-radius: 8px;
        padding: 12px 13px;
        color: var(--text);
        font-family: 'Jost', sans-serif;
        font-size: 14px;
    }

    input[type=text]::placeholder {
        color: var(--faint);
    }

    input[type=text]:focus {
        outline: none;
        border-color: var(--gb);
    }

    textarea {
        width: 100%;
        background: rgba(0, 0, 0, .35);
        border: 1px solid rgba(255, 255, 255, .1);
        border-radius: 8px;
        padding: 13px;
        color: var(--text);
        font-family: 'Jost', sans-serif;
        font-size: 15px;
        line-height: 1.65;
        resize: none;
    }

    textarea::placeholder {
        color: var(--faint);
    }

    textarea:focus {
        outline: none;
        border-color: var(--gb);
    }

    .chk-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 7px;
    }

    .chk {
        display: flex;
        align-items: flex-start;
        gap: 9px;
        padding: 11px;
        border: 1px solid rgba(255, 255, 255, .07);
        border-radius: 9px;
        cursor: pointer;
        transition: all .2s;
    }

    .chk.on {
        border-color: var(--gold);
        background: var(--gdim);
    }

    .chk-box {
        width: 17px;
        height: 17px;
        border-radius: 4px;
        border: 1.5px solid rgba(255, 255, 255, .22);
        flex-shrink: 0;
        margin-top: 1px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
    }

    .chk.on .chk-box {
        border-color: var(--gold);
        background: var(--gold);
        color: #1a1025;
    }

    .chk-l {
        font-size: 11px;
        color: var(--dim);
        line-height: 1.4;
    }

    .chk-s {
        font-size: 9px;
        color: var(--faint);
        margin-top: 2px;
    }

    .chk1 {
        display: flex;
        align-items: flex-start;
        gap: 9px;
        padding: 11px;
        border: 1px solid rgba(255, 255, 255, .07);
        border-radius: 9px;
        cursor: pointer;
        transition: all .2s;
    }

    .chk1.on {
        border-color: var(--gold);
        background: var(--gdim);
    }

    .pill-grid {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
    }

    .pill {
        padding: 8px 13px;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, .12);
        font-size: 11px;
        color: var(--dim);
        cursor: pointer;
        transition: all .2s;
    }

    .pill.on {
        border-color: var(--gold);
        background: var(--gdim);
        color: var(--gold);
    }

    .cat-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 13px 0;
        border-bottom: 1px solid rgba(255, 255, 255, .05);
    }

    .cat-row:last-child {
        border-bottom: none;
        padding-bottom: 0;
    }

    .status {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        padding: 11px 13px;
        border-radius: 8px;
        margin-bottom: 11px;
    }

    .status.loading {
        background: rgba(124, 92, 191, .1);
        border: 1px solid rgba(124, 92, 191, .2);
        color: #9C7CDF;
    }

    .status.ok {
        background: rgba(74, 138, 107, .1);
        border: 1px solid rgba(74, 138, 107, .2);
        color: var(--green);
    }

    .status.err {
        background: rgba(220, 70, 70, .1);
        border: 1px solid rgba(220, 70, 70, .2);
        color: #e07070;
    }

    .spinner {
        width: 14px;
        height: 14px;
        border: 2px solid rgba(124, 92, 191, .3);
        border-top-color: #9C7CDF;
        border-radius: 50%;
        animation: spin .8s linear infinite;
        flex-shrink: 0;
    }

    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }

    .tip {
        background: rgba(201, 168, 76, .07);
        border: 1px solid var(--gb);
        border-radius: 8px;
        padding: 12px 14px;
        font-size: 12px;
        color: var(--dim);
        line-height: 1.65;
        margin-bottom: 12px;
    }

    .tip strong {
        color: var(--gold);
    }

    .info-box {
        background: rgba(74, 138, 107, .06);
        border: 1px solid rgba(74, 138, 107, .22);
        border-radius: 8px;
        padding: 14px;
        font-size: 12px;
        color: rgba(240, 236, 228, .78);
        line-height: 1.8;
        margin-bottom: 12px;
    }

    .info-box strong {
        color: var(--green);
    }

    .divider {
        height: 1px;
        background: rgba(255, 255, 255, .06);
        margin: 16px 0;
    }

    .content-body {
        font-size: 13px;
        line-height: 1.8;
        color: rgba(240, 236, 228, .88);
        white-space: pre-wrap;
        margin-bottom: 14px;
    }

    .step-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: rgba(201, 168, 76, .15);
        border: 1px solid var(--gb);
        color: var(--gold);
        font-size: 11px;
        flex-shrink: 0;
        margin-right: 10px;
        margin-top: 1px;
    }

    .step-row {
        display: flex;
        align-items: flex-start;
        margin-bottom: 14px;
    }

    .step-row:last-child {
        margin-bottom: 0;
    }

    .step-text {
        font-size: 13px;
        color: var(--dim);
        line-height: 1.6;
    }

    .step-text strong {
        color: var(--text);
    }
    </style>
</head>
<body>

    <div id="s-welcome" class="scr on">
        <div class="hdr">
            <div class="logo">Content Studio</div>
            <button class="btn-sm btn-sm-od" onclick="showSettings()">Settings</button>
        </div>
        <div class="body" id="welcome-body"></div>
    </div>

    <div id="s-settings" class="scr">
        <div class="hdr">
            <div class="logo">Settings</div>
            <button class="btn-sm btn-sm-od" onclick="showWelcome()">&#8592; Back</button>
        </div>
        <div class="body" id="settings-body"></div>
    </div>

    <div id="s-categories" class="scr">
        <div class="hdr">
            <div class="logo">Content Studio</div>
            <button class="btn-sm btn-sm-od" onclick="showWelcome()">&#8962; Home</button>
        </div>
        <div class="body" id="categories-body"></div>
    </div>

    <div id="s-question" class="scr">
        <div class="hdr">
            <div class="logo">Content Studio</div>
            <span id="q-prog" style="font-size:10px;color:var(--faint)"></span>
        </div>
        <div class="body" id="question-body"></div>
    </div>

    var QS = [

    {
        id: "carousel",
        l: "Photo / Carousel",
        s: "Instagram / Facebook"
    },
    {
        id: "blog",
        l: "Blog Post",
        s: "Long-form written"
    },
    {
        id: "podcast",
        l: "Podcast / Audio",
        s: "Episode or clip"
    }
    ];

    var VOICES = [
    {
        id: "authoritative",
        l: "Authoritative"
    },
    {
        id: "conversational",
        l: "Conversational"
    },
    {
        id: "humorous",
        l: "Humorous"
    },
    {
        id: "inspirational",
        l: "Inspirational"
    },
    {
        id: "aspirational",
        l: "Aspirational"
    }
    ];

    var CTYPES = [
    {
        id: "edu_cta",
        l: "Educational + Booking CTA",
        s: "Teach something valuable, invite them to book"
    },
    {
        id: "edu_no_cta",
        l: "Educational / Authority",
        s: "Build trust and expertise, no direct pitch"
    },
    {
        id: "engagement",
        l: "Engagement Driver",
        s: "Spark comments, saves, shares, questions"
    },
    {
        id: "entertainment",
        l: "Entertainment / Personality",
        s: "Fun, relatable, shows who you are"
    },
    {
        id: "awareness",
        l: "Brand Awareness",
        s: "Introduce your work to new audiences"
    },
    {
        id: "transformation",
        l: "Transformation Story",
        s: "Before and after, client results, emotional impact"
    },
    {
        id: "mythbusting",
        l: "Myth Busting",
        s: "Correct misconceptions, build authority"
    }
    ];

    var SK = "csa_v6";
    var S = {
        biz: {
            name: "",
            location: "",
            virtual: false
        },
        catId: null,
        qIdx: 0,
        fmt: "",
        voice: "",
        ctype: "",
        answer: ""
    };

    function sv() {
        try {
            localStorage.setItem(SK, JSON.stringify({
                biz: S.biz
            }));
        } catch (e) {}
    }
    function ld() {
        try {
            var d = JSON.parse(localStorage.getItem(SK) || "null");
            if (d && d.biz)
                S.biz = d.biz;
        } catch (e) {}
    }
    ld();

    function show(id) {
        document.querySelectorAll(".scr").forEach(function(s) {
            s.classList.remove("on");
        });
        document.getElementById(id).classList.add("on");
    }
    function showWelcome() {
        show("s-welcome");
        rWelcome();
    }
    function showSettings() {
        show("s-settings");
        rSettings();
    }
    function showCategories() {
        show("s-categories");
        rCategories();
    }
    function showQuestion() {
        show("s-question");
        rQuestion();
    }

    function rWelcome() {
        var bizLine = S.biz.name
        ? '<div style="text-align:center;margin-top:10px;font-size:11px;color:var(--faint)">' + esc(S.biz.name) + (S.biz.location ? ' &middot; ' + esc(S.biz.location) : '') + (S.biz.virtual ? ' &middot; Virtual available' : '') + '</div>'
        : '<div style="text-align:center;margin-top:10px"><button class="btn-sm btn-sm-od" onclick="showSettings()">Add business info for booking CTAs</button></div>';
        document.getElementById("welcome-body").innerHTML =
        '<div style="margin-bottom:24px"><div class="display">Content Studio</div><div class="sub">True Style Atelier</div><p style="font-size:14px;color:var(--dim);line-height:1.75">Your expertise is already inside you. This tool helps you capture it \u2014 one question at a time \u2014 and turn it into ready-to-use content.</p></div>'
        + '<div class="card" style="margin-bottom:20px"><span class="lbl">How it works</span>'
        + '<div class="step-row"><span class="step-badge">1</span><div class="step-text"><strong>Choose a category</strong> \u2014 pick a topic you feel like talking about today.</div></div>'
        + '<div class="step-row"><span class="step-badge">2</span><div class="step-text"><strong>See a question</strong> \u2014 read it, then speak or type your answer.</div></div>'
        + '<div class="step-row"><span class="step-badge">3</span><div class="step-text"><strong>Choose format, voice, and goal</strong> \u2014 decide what kind of content you want from this answer.</div></div>'
        + '<div class="step-row"><span class="step-badge">4</span><div class="step-text"><strong>Generate and copy</strong> \u2014 paste it into a doc, then keep going or try another format from the same answer.</div></div>'
        + '</div>'
        + '<button class="btn btn-gold" onclick="showCategories()">Choose a Category \u2192</button>'
        + bizLine;
    }

    function rSettings() {
        document.getElementById("settings-body").innerHTML =
        '<div style="margin-bottom:18px"><div class="display" style="font-size:22px">Business Info</div><p style="font-size:13px;color:var(--faint);line-height:1.65;margin-top:6px">Optional \u2014 fill this in if you want booking CTAs in your content. Leave blank if the goal of the piece is not about booking.</p></div>'
        + '<div class="card"><span class="lbl">Business name</span><input type="text" id="inp-name" placeholder="e.g. True Style Atelier" value="' + esc(S.biz.name) + '" style="margin-bottom:12px"><span class="lbl">Location <span style="color:var(--faint);font-size:9px">(city, state \u2014 for in-person services)</span></span><input type="text" id="inp-loc" placeholder="e.g. Atlanta, GA" value="' + esc(S.biz.location) + '"></div>'
        + '<div class="card"><span class="lbl">Service delivery</span><div class="chk1' + (S.biz.virtual ? ' on' : '') + '" id="vchk" onclick="togV()"><div class="chk-box" id="vbox">' + (S.biz.virtual ? '&#10003;' : '') + '</div><div><div class="chk-l">Virtual services available</div><div class="chk-s">I also work with clients outside my local area</div></div></div></div>'
        + '<button class="btn btn-gold" onclick="saveSettings()">Save \u2713</button><button class="btn btn-od" onclick="showWelcome()">Cancel</button>';
    }

    function togV() {
        S.biz.virtual = !S.biz.virtual;
        var b = document.getElementById("vbox");
        var c = document.getElementById("vchk");
        if (b)
            b.innerHTML = S.biz.virtual ? '&#10003;' : '';
        if (c)
            c.className = 'chk1' + (S.biz.virtual ? ' on' : '');
    }

    function saveSettings() {
        var n = document.getElementById("inp-name");
        var l = document.getElementById("inp-loc");
        S.biz.name = n ? n.value.trim() : '';
        S.biz.location = l ? l.value.trim() : '';
        sv();
        showWelcome();
    }

    function rCategories() {
        var html = '<div style="margin-bottom:18px"><div class="display" style="font-size:22px">Choose a Category</div><p style="font-size:13px;color:var(--faint);line-height:1.65;margin-top:6px">Pick what you feel like talking about today. You can always come back and do another category.</p></div><div class="card">';
        CATS.forEach(function(cat) {
            var count = QS.filter(function(q) {
                return q.cat === cat.id;
            }).length;
            html += '<div class="cat-row"><div><div style="font-size:13px;color:var(--text)">' + cat.name + '</div><div style="font-size:10px;color:' + cat.col + ';margin-top:2px">' + count + ' questions \u00b7 ' + cat.desc + '</div></div><button class="btn-sm btn-sm-og" onclick="startCat(\'' + cat.id + '\')">Start \u2192</button></div>';
        });
        html += '</div>';
        document.getElementById("categories-body").innerHTML = html;
    }

    function startCat(catId) {
        S.catId = catId;
        S.qIdx = 0;
        S.fmt = "";
        S.voice = "";
        S.ctype = "";
        S.answer = "";
        showQuestion();
    }

    function getCatQs() {
        return QS.filter(function(q) {
            return q.cat === S.catId;
        });
    }

    function rQuestion() {
        var qs = getCatQs();
        var q = qs[S.qIdx];
        var cat = CATS.find(function(c) {
            return c.id === S.catId;
        });
        if (!q || !cat) {
            showCategories();
            return;
        }
        var prog = document.getElementById("q-prog");
        if (prog)
            prog.textContent = (S.qIdx + 1) + "/" + qs.length;

        var fmtHtml = FMTS.map(function(f) {
            var on = S.fmt === f.id;
            return '<div class="chk' + (on ? ' on' : '') + '" onclick="selF(\'' + f.id + '\')"><div class="chk-box">' + (on ? '&#10003;' : '') + '</div><div><div class="chk-l">' + f.l + '</div><div class="chk-s">' + f.s + '</div></div></div>';
        }).join('');
        var voiceHtml = VOICES.map(function(v) {
            var on = S.voice === v.id;
            return '<div class="pill' + (on ? ' on' : '') + '" onclick="selV(\'' + v.id + '\')">' + v.l + '</div>';
        }).join('');
        var ctHtml = CTYPES.map(function(ct) {
            var on = S.ctype === ct.id;
            return '<div class="chk1' + (on ? ' on' : '') + '" onclick="selC(\'' + ct.id + '\')"><div class="chk-box">' + (on ? '&#10003;' : '') + '</div><div><div class="chk-l">' + ct.l + '</div><div class="chk-s">' + ct.s + '</div></div></div>';
        }).join('');
        var canGen = !!(S.fmt && S.voice && S.ctype);
        var wc = S.answer.trim() ? S.answer.trim().split(/\s+/).length + ' words' : '';

        document.getElementById("question-body").innerHTML =
        '<div class="card" style="border-color:' + cat.col + '44;background:' + cat.col + '0d;margin-bottom:14px">'
        + '<div style="font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:' + cat.col + ';margin-bottom:10px">' + cat.name + '</div>'
        + '<div class="q-text">' + q.q + '</div>'
        + (q.nudge ? '<div class="nudge">&#128172; ' + q.nudge + '</div>' : '')
        + '</div>'
        + '<div class="tip"><strong>To answer:</strong> Tap the box below, then use the <strong>mic key on your keyboard</strong> to speak. Or just type. The more detail, the better the content.</div>'
        + '<textarea id="ans-ta" placeholder="Tap here \u2014 use keyboard mic to speak, or type your answer\u2026" style="min-height:140px;margin-bottom:6px">' + esc(S.answer) + '</textarea>'
        + '<div id="wc" style="font-size:10px;color:var(--faint);margin-bottom:16px">' + wc + '</div>'
        + '<div class="card" style="margin-bottom:11px"><span class="lbl">Content format <span style="color:var(--gold);font-size:9px">choose one</span></span><div class="chk-grid">' + fmtHtml + '</div></div>'
        + '<div class="card" style="margin-bottom:11px"><span class="lbl">Voice / tone <span style="color:var(--gold);font-size:9px">choose one</span></span><div class="pill-grid">' + voiceHtml + '</div></div>'
        + '<div class="card" style="margin-bottom:11px"><span class="lbl">Content goal <span style="color:var(--gold);font-size:9px">choose one</span></span><p style="font-size:11px;color:var(--faint);margin-bottom:10px">If you want a booking CTA, add your business info under Settings first.</p><div style="display:flex;flex-direction:column;gap:7px">' + ctHtml + '</div></div>'
        + '<div id="gen-status"></div>'
        + '<button class="btn btn-gold" id="gen-btn" onclick="genContent()" ' + (canGen ? '' : 'disabled style="opacity:0.45"') + '>' + (canGen ? '&#10022; Generate Content' : '&#10022; Choose format, voice, and goal above') + '</button>'
        + '<div id="gen-output"></div>'
        + '<div class="divider"></div>'
        + '<div class="btn-row" style="justify-content:space-between;margin-bottom:8px">'
        + '<button class="btn-sm btn-sm-od" onclick="goBack()">&#8592; Back</button>'
        + '<button class="btn-sm btn-sm-od" onclick="skipQ()">Skip &#8594;</button>'
        + '</div>'
        + '<button class="btn btn-od" onclick="showCategories()">&#8962; Change Category</button>';

        var ta = document.getElementById("ans-ta");
        if (ta) {
            ta.addEventListener("input", function() {
                S.answer = ta.value;
                var wcel = document.getElementById("wc");
                if (wcel)
                    wcel.textContent = ta.value.trim() ? ta.value.trim().split(/\s+/).length + ' words' : '';
            });
        }
    }

    function selF(id) {
        S.fmt = id;
        rQuestion();
    }
    function selV(id) {
        S.voice = id;
        rQuestion();
    }
    function selC(id) {
        S.ctype = id;
        rQuestion();
    }

    function goBack() {
        if (S.qIdx > 0) {
            S.qIdx--;
            S.answer = "";
            rQuestion();
        }
        else {
            showCategories();
        }
    }
    function skipQ() {
        var qs = getCatQs();
        if (S.qIdx < qs.length - 1) {
            S.qIdx++;
            S.answer = "";
            rQuestion();
            window.scrollTo(0, 0);
        }
        else {
            showCategories();
        }
    }
    function nextQ() {
        var qs = getCatQs();
        S.fmt = "";
        S.voice = "";
        S.ctype = "";
        S.answer = "";
        if (S.qIdx < qs.length - 1) {
            S.qIdx++;
            rQuestion();
            window.scrollTo(0, 0);
        }
        else {
            showCategories();
        }
    }

    async function genContent() {
        var ta = document.getElementById("ans-ta");
        var answer = ta ? ta.value.trim() : S.answer.trim();
        var st = document.getElementById("gen-status");
        var btn = document.getElementById("gen-btn");
        var out = document.getElementById("gen-output");
        if (!answer) {
            if (st)
                st.innerHTML = '<div class="status err">Please type or speak your answer first.</div>';
            return;
        }
        if (!S.fmt || !S.voice || !S.ctype) {
            if (st)
                st.innerHTML = '<div class="status err">Please choose a format, voice, and content goal.</div>';
            return;
        }
        S.answer = answer;
        if (st)
            st.innerHTML = '<div class="status loading"><div class="spinner"></div>Generating your content \u2014 about 15 seconds\u2026</div>';
        if (btn) {
            btn.disabled = true;
            btn.textContent = "Generating\u2026";
        }
        if (out)
            out.innerHTML = '';

        var qs = getCatQs();
        var q = qs[S.qIdx];
        var fmtObj = FMTS.find(function(f) {
            return f.id === S.fmt;
        });
        var ctObj = CTYPES.find(function(c) {
            return c.id === S.ctype;
        });
        var voiceMap = {
            authoritative: "authoritative and educational \u2014 expert-led, clear, builds trust",
            conversational: "friendly and conversational \u2014 warm, approachable, like talking to a trusted friend",
            humorous: "entertaining and humorous \u2014 fun, playful, shows personality",
            inspirational: "inspirational and empowering \u2014 uplifting, emotional, motivating",
            aspirational: "refined and aspirational \u2014 elevated, sophisticated, curated"
        };
        var fmtMap = {
            shortform: "SHORT-FORM VIDEO SCRIPT\nHook (stops the scroll in 3 seconds) + Body + CTA. Under 60 seconds read aloud. Label sections: HOOK / BODY / CTA.",
            longform: "LONG-FORM VIDEO OUTLINE\nTitle suggestion + Intro hook + 3-5 talking points with detail + Closing CTA. Speaking guide, not word-for-word script.",
            carousel: "CAROUSEL / CAPTION\n1) Ready-to-post caption with 3-5 hashtags. 2) Slide-by-slide text (Slide 1 = hook, final slide = CTA).",
            blog: "BLOG POST SECTION\nCompelling headline + Engaging intro + 2-3 body paragraphs + Closing with CTA.",
            podcast: "PODCAST TALKING POINTS\nEpisode title + Key talking points + Personal stories to expand on + Closing thought."
        };
        var ctaBlock = "";
        if (S.ctype === "edu_cta" || S.ctype === "transformation") {
            if (S.biz.name) {
                ctaBlock = "Include a warm, inviting CTA to book with " + S.biz.name + (S.biz.location ? " in " + S.biz.location : "") + (S.biz.virtual ? ". Virtual sessions also available." : "." + " Not pushy \u2014 just a natural next step.");
            }
            else {
                ctaBlock = "Include a warm, general invitation to book a session (no specific business name \u2014 keep it inviting and natural).";
            }
        }
        var sys = "You are a content creation assistant for a color analyst and personal stylist.\n\nVoice: " + voiceMap[S.voice] + "\nContent goal: " + ctObj.l + " \u2014 " + ctObj.s + "\n" + (ctaBlock ? ctaBlock + "\n" : "") + "\nCreate ONE complete, polished, ready-to-use piece of content in this format:\n" + fmtMap[S.fmt] + "\n\nWrite only the content itself. No preamble, no meta-commentary, no labels like 'Here is your content'. Just the piece, ready to copy and use.";
        var usr = "Question I was answering: \"" + q.q + "\"\n\nMy answer: \"" + answer + "\"";

        try {
            var resp = await fetch("/.netlify/functions/generate", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    model: "claude-sonnet-4-5",
                    max_tokens: 1000,
                    system: sys,
                    messages: [{
                        role: "user",
                        content: usr
                    }]
                })
            });
            var data = await resp.json();
            if (data.content && data.content[0] && data.content[0].text) {
                var gen = data.content[0].text.trim();
                window._gen = gen;
                if (st)
                    st.innerHTML = '<div class="status ok">&#10003; Content generated \u2014 copy it below.</div>';
                if (btn) {
                    btn.disabled = false;
                    btn.textContent = "&#10022; Generate Again (Different Version)";
                }
                if (out) {
                    out.innerHTML = '<div style="margin-top:16px">'
                    + '<div class="info-box"><strong>&#128203; Copy this into a doc to save it.</strong><br>Want to generate a different format or voice from the same answer? Change your selections above and tap Generate Again.<br>Ready for the next question? Tap the button below.</div>'
                    + '<div class="card card-green"><div class="content-body" id="gen-text">' + esc(gen) + '</div>'
                    + '<button class="btn btn-og2" id="copy-btn" onclick="doCopy()" style="margin-bottom:0">&#128203; Copy This Content</button></div>'
                    + '<button class="btn btn-gold" style="margin-top:10px" onclick="nextQ()">Next Question \u2192</button>'
                    + '</div>';
                }
            } else {
                throw new Error("no content");
            }
        } catch (err) {
            if (st)
                st.innerHTML = '<div class="status err">Something went wrong \u2014 please try again.</div>';
            if (btn) {
                btn.disabled = false;
                btn.textContent = "&#10022; Generate Content";
            }
        }
    }

    function doCopy() {
        var el = document.getElementById("gen-text");
        var text = el ? (el.innerText || el.textContent) : (window._gen || "");
        if (!text)
            return;
        function done(ok) {
            var b = document.getElementById("copy-btn");
            if (b) {
                var o = b.innerHTML;
                b.textContent = ok ? "\u2713 Copied!" : "Copy failed";
                setTimeout(function() {
                    b.innerHTML = o;
                }, 2500);
            }
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(function() {
                done(true);
            }).catch(function() {
                fb(text, done);
            });
        }
        else {
            fb(text, done);
        }
    }
    function fb(text, cb) {
        var ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        var ok = false;
        try {
            ok = document.execCommand("copy");
        } catch (e) {}
        document.body.removeChild(ta);
        if (cb)
            cb(ok);
    }

    function esc(s) {
        if (!s)
            return '';
        return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    showWelcome();
    </script>
</body>
</html>
